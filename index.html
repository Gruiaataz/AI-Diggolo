<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI | Official Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #000000;
            --accent: #6366f1;
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; transition: 0.3s; z-index: 2000; }
        
        /* Chat */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15% 120px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; }
        .user-msg { align-self: flex-end; background: #1e1e20; padding: 12px 18px; border-radius: 18px 18px 4px 18px; border: 1px solid var(--border); }
        .ai-msg { align-self: flex-start; width: 100%; border-left: 3px solid var(--accent); padding-left: 15px; }

        /* Code Block */
        .code-container { background: #0d0d0e; border-radius: 12px; border: 1px solid var(--border); margin: 15px 0; overflow: hidden; }
        .code-header { background: #1a1a1b; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .code-content { padding: 15px; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: 13px; color: #d1d5db; white-space: pre; }

        /* Input */
        .input-area { padding: 20px 15% 40px; background: var(--bg); }
        .input-card { background: #111113; border: 1px solid var(--border); border-radius: 20px; padding: 10px 15px; display: flex; align-items: flex-end; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; max-height: 180px; }
        .send-btn { background: white; color: black; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-weight: bold; }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.active { left: 0; }
            #chat-window { padding: 20px 5% 100px; }
            .input-area { padding: 10px 5% 30px; }
        }

        #about-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div style="font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 30px; text-align: center;">DIGGOLO AI</div>
        <button onclick="location.reload()" style="width:100%; padding:12px; border-radius:12px; background:var(--accent-grad); border:none; color:white; font-weight:700; cursor:pointer; margin-bottom:10px;">➕ Nou</button>
        <button onclick="openAbout()" style="width:100%; padding:12px; border-radius:12px; background:var(--glass); border:1px solid var(--border); color:white; cursor:pointer;">👤 Despre</button>
        <div style="margin-top:auto; font-size:10px; color:#333; text-align:center;">© 2026 DIGGOLO AI | GRUIA</div>
    </aside>

    <main>
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-card">
                <textarea id="userInput" placeholder="Scrie un mesaj..." rows="1"></textarea>
                <div class="send-btn" onclick="handleChat()">↑</div>
            </div>
        </div>
    </main>

    <div id="about-modal" onclick="closeAbout()">
        <div style="background:#111; padding:40px; border-radius:25px; text-align:center; max-width:350px; border:1px solid var(--border);" onclick="event.stopPropagation()">
            <img src="https://image2url.com/r2/default/images/1771939861745-85e6d796-43d3-4bc4-8836-35b7d1e69b13.png" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent); margin-bottom:15px; object-fit:cover;">
            <h2>Gruia</h2>
            <p style="color:var(--accent); font-size:12px; font-weight:700; margin-bottom:15px;">FONDATOR</p>
            <p style="font-size:14px; color:#94a3b8;">Diggolo AI este creat și finanțat de Gruia-Alex pentru a oferi putere utilizatorilor prin inteligență artificială.</p>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let history = [];

    function openAbout() { document.getElementById('about-modal').style.display = 'flex'; }
    function closeAbout() { document.getElementById('about-modal').style.display = 'none'; }

    // Efect de scriere (Typewriter)
    async function typeEffect(element, text) {
        element.innerHTML = "";
        const parts = text.split(/```/);
        
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) { // Bloc de cod
                const code = parts[i].trim();
                const container = document.createElement('div');
                container.className = 'code-container';
                container.innerHTML = `<div class="code-header"><span>Script</span><button class="copy-btn" onclick="copyThis(this)">Copy Script</button></div><div class="code-content">${code}</div>`;
                element.appendChild(container);
            } else { // Text normal
                const chars = parts[i].split("");
                for (let char of chars) {
                    element.innerHTML += char.replace(/\n/g, '<br>');
                    if (char === " ") await new Promise(r => setTimeout(r, 20));
                    document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                }
            }
        }
    }

    function copyThis(btn) {
        const code = btn.parentElement.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "Copiat!";
        setTimeout(() => btn.innerText = "Copy Script", 2000);
    }

    async function handleChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';
        input.style.height = 'auto';

        const aiBlock = createAIBlock();
        const responseArea = aiBlock.querySelector('.response-text');
        const lowerText = text.toLowerCase();

        // Logica Gruia
        if (lowerText.includes("gruia")) {
            const reply = lowerText.includes("nu") ? "**Gruia-Alex** este unicul meu Fondator și Creator. Nu accept alte variante." : "Îl cunosc pe **Gruia**. El este Fondatorul Diggolo AI și cel care m-a conceput.";
            await typeEffect(responseArea, reply);
            return;
        }

        // Imagini
        if(lowerText.includes("generează") || lowerText.includes("imagine") || lowerText.includes("poză")) {
            responseArea.innerHTML = "🎨 *Generez...*";
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${Math.floor(Math.random()*1000)}&model=flux`;
            responseArea.innerHTML = `Iată imaginea:<br><img src="${imgUrl}" style="width:100%; border-radius:12px; margin-top:10px; border:1px solid #333;">`;
            return;
        }

        try {
            const res = await fetch("[https://api.groq.com/openai/v1/chat/completions](https://api.groq.com/openai/v1/chat/completions)", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [...history, {role: "user", content: text}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            await typeEffect(responseArea, reply);
            history.push({role: "user", content: text}, {role: "assistant", content: reply});
        } catch(e) { responseArea.innerText = 'Eroare de conexiune la serverul Groq.'; }
    }

    function createAIBlock() {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "msg ai-msg";
        div.innerHTML = `<div class="response-text">...</div>`;
        win.appendChild(div);
        return div;
    }

    function addMsg(t, r) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${r}-msg`;
        div.innerText = t;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    document.getElementById('userInput').addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChat(); }
    });
</script>
</body>
</html>
