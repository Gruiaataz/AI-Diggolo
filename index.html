<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggolo-AI Standard</title>
    <style>
        :root {
            --bg: #09090b;
            --sidebar: #111113;
            --accent: #3b82f6;
            --card: #1c1c1f;
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --border: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .new-chat { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 15px; transition: 0.2s; }
        .new-chat:hover { opacity: 0.9; }

        .search-container { margin-bottom: 20px; }
        .search-container input { width: 100%; background: #18181b; border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: white; outline: none; }

        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .chat-item { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover, .chat-item.active { background: var(--card); color: white; }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        #chat-window { flex: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px; border-radius: 12px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .input-area { padding: 20px 15% 40px; }
        .input-box { background: #18181b; border: 1px solid var(--border); border-radius: 15px; display: flex; padding: 10px 15px; align-items: center; }
        input#userInput { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 10px; }
        #sendBtn { color: var(--accent); cursor: pointer; font-weight: bold; padding: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="new-chat" onclick="createNewChat()">+ Chat Nou</button>
        <div class="search-container">
            <input type="text" id="search" placeholder="Caută..." oninput="filterChats()">
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main">
        <div class="header"><h2>Diggolo-AI Standard</h2></div>
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Scrie un mesaj aici...">
                <div id="sendBtn">TRIMITE</div>
            </div>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let chats = JSON.parse(localStorage.getItem('diggolo_chats')) || [];
    let currentChatId = null;

    function init() {
        renderChatList();
        if(chats.length > 0) loadChat(chats[0].id);
        else createNewChat();
    }

    function createNewChat() {
        const id = Date.now();
        const newChat = { id, title: "Chat Nou", messages: [{ role: "system", content: "Ești Diggolo AI. Autor: Gruia (gruiaa69)." }] };
        chats.unshift(newChat);
        saveAndRender();
        loadChat(id);
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = chats.find(c => c.id === id);
        const window = document.getElementById('chat-window');
        window.innerHTML = '';
        chat.messages.forEach(m => {
            if(m.role !== 'system') addMessageToUI(m.content, m.role === 'user' ? 'user' : 'ai');
        });
        renderChatList();
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMessageToUI(text, 'user');
        input.value = '';
        const loading = addMessageToUI("Se Incarca Mesaj-ul...", 'ai');

        const chat = chats.find(c => c.id === currentChatId);
        chat.messages.push({ role: "user", content: text });
        if(chat.title === "Chat Nou") chat.title = text.substring(0, 20);

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chat.messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            chat.messages.push({ role: "assistant", content: reply });
            loading.innerText = reply;
            saveAndRender();
        } catch (e) { loading.innerText = "Eroare la trimitere."; }
    }

    function addMessageToUI(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const window = document.getElementById('chat-window');
        window.appendChild(div);
        window.scrollTop = window.scrollHeight;
        return div;
    }

    function saveAndRender() {
        localStorage.setItem('diggolo_chats', JSON.stringify(chats));
        renderChatList();
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        chats.forEach(c => {
            const item = document.createElement('div');
            item.className = `chat-item ${c.id === currentChatId ? 'active' : ''}`;
            item.innerText = c.title;
            item.onclick = () => loadChat(c.id);
            list.appendChild(item);
        });
    }

    function filterChats() {
        const term = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.chat-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });

    init();
</script>
</body>
</html>
