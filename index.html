<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggolo AI v4 | Gruia Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0e; --accent: #3b82f6; --glass: rgba(22, 22, 26, 0.8); --text: #ececec; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        .sidebar { width: 260px; background: #000; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(90deg, #4285f4, #9b72cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        
        /* Bubble Design */
        .msg { max-width: 85%; animation: fadeIn 0.3s ease; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #27272a; padding: 12px 18px; border-radius: 20px 20px 4px 20px; }
        .ai-msg { align-self: flex-start; width: 100%; border-left: 2px solid var(--accent); padding-left: 15px; }

        /* Thinking Style */
        .thought { font-size: 13px; color: #71717a; margin-bottom: 8px; font-style: italic; display: flex; align-items: center; gap: 8px; }
        .spinner { width: 12px; height: 12px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360px); } }

        .response-text { font-size: 16px; }
        .ai-img { max-width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid #333; display: block; background: #1a1a1a; min-height: 200px; }

        .input-area { padding: 20px 15% 40px; background: linear-gradient(transparent, var(--bg)); }
        .input-box { background: #1c1c1f; border: 1px solid #333; border-radius: 20px; padding: 12px 20px; display: flex; align-items: center; gap: 15px; }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; }
        .send-btn { background: #fff; color: #000; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { #chat-window { padding: 20px 5%; } .input-area { padding: 10px 5% 20px; } .sidebar { display: none; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">DIGGOLO AI</div>
    <button style="background:#222; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;" onclick="location.reload()">+ Chat Nou</button>
    <div style="margin-top:auto; font-size:10px; color:#444;">V4.0 | GRUIA PRO</div>
</aside>

<main style="flex:1; display:flex; flex-direction:column;">
    <div id="chat-window"></div>
    <div class="input-area">
        <div class="input-box">
            <textarea id="userInput" placeholder="Scrie ceva sau cere o poză..." rows="1"></textarea>
            <div class="send-btn" onclick="handleChat()">↑</div>
        </div>
    </div>
</main>

<script>
    const API_KEY = "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";
    let history = [];

    async function handleChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';
        
        const aiDiv = createAIBlock();
        const thoughtEl = aiDiv.querySelector('.thought');
        const textEl = aiDiv.querySelector('.response-text');

        // Logică Generare Imagine
        if(text.toLowerCase().includes("generează") || text.toLowerCase().includes("fă-mi o poză")) {
            thoughtEl.innerHTML = '<div class="spinner"></div> Se gândește la designul mașinii...';
            setTimeout(() => {
                const seed = Math.floor(Math.random() * 100000);
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${seed}&model=flux`;
                thoughtEl.innerHTML = '✅ Imagine generată cu succes.';
                textEl.innerHTML = `Iată ce am creat pentru tine, Gruia:<br><img src="${imgUrl}" class="ai-img" alt="Generare..." onerror="this.src='https://via.placeholder.com/1024x1024?text=Eroare+Imagine+Incearca+Din+Nou'">`;
            }, 2000);
            return;
        }

        // Logică Text
        thoughtEl.innerHTML = '<div class="spinner"></div> Se gândește la un răspuns inteligent...';
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [...history, {role: "user", content: text}],
                    temperature: 0.7
                })
            });
            
            const data = await res.json();
            if(!res.ok) throw new Error();
            
            const reply = data.choices[0].message.content;
            thoughtEl.style.display = 'none'; // Ascunde gândirea când e gata
            textEl.innerHTML = reply.replace(/\n/g, '<br>');
            history.push({role: "user", content: text}, {role: "assistant", content: reply});
        } catch (e) {
            thoughtEl.innerHTML = '❌ Eroare la procesare.';
            textEl.innerText = "Se pare că serverul Groq e puțin obosit. Mai încearcă o dată!";
        }
    }

    function createAIBlock() {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "msg ai-msg";
        div.innerHTML = `<div class="thought"></div><div class="response-text"></div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function addMsg(t, r) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${r}-msg`;
        div.innerText = t;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', e => {
        if(e.key === 'Enter') handleChat();
    });
</script>
</body>
</html>
