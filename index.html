<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d0d0e;
            --sidebar-bg: #171719;
            --accent-primary: #3b82f6; /* Blue ChatGPT style */
            --accent-gemini: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --card-bg: #1e1e20;
            --text-main: #ececec;
            --text-muted: #9fa0a3;
            --border-color: #2d2d30;
            --user-msg-bg: #2f2f32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Glassmorphism style */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .new-chat-btn {
            background: transparent;
            color: white;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover { background: #2d2d30; }

        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.2s;
        }
        .chat-item:hover { background: #232326; color: white; }
        .chat-item.active { background: #2d2d30; color: white; }

        /* Main Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, var(--bg-dark) 50%);
        }

        .header {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
            background: var(--accent-gemini);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            scroll-behavior: smooth;
        }

        /* Mesaje */
        .message-row { display: flex; width: 100%; flex-direction: column; }
        .msg {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
        }

        .user-row { align-items: flex-end; }
        .user-msg { background: var(--user-msg-bg); color: white; border-bottom-right-radius: 4px; }

        .ai-row { align-items: flex-start; }
        .ai-msg { background: transparent; width: 100%; max-width: 100%; padding-left: 0; }

        /* Blocuri de cod - Nota 10 */
        .code-block {
            background: #000;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .code-header {
            background: #1a1a1c;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }
        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .copy-btn:hover { background: var(--accent-primary); color: white; }
        
        pre {
            padding: 20px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13.5px;
            color: #e0e0e0;
        }

        /* Input Area - Gemini style Floating */
        .input-container {
            padding: 20px 15% 40px;
            background: linear-gradient(transparent, var(--bg-dark) 40%);
        }

        .input-wrapper {
            background: #1e1e20;
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 12px 20px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            transition: border 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-wrapper:focus-within { border-color: #4b4b4f; }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 6px 0;
            resize: none;
            max-height: 200px;
            min-height: 24px;
        }

        .send-btn {
            background: var(--text-main);
            color: black;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
            font-weight: bold;
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn.disabled { opacity: 0.3; cursor: not-allowed; }

        /* Animatii si Mobile */
        @media (max-width: 768px) {
            #chat-window { padding: 30px 20px; }
            .input-container { padding: 15px 15px 30px; }
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.open { left: 0; }
        }

        .typing-dot {
            width: 8px; height: 8px; background: var(--text-muted);
            border-radius: 50%; display: inline-block;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()">
            <span>+</span> Chat Nou
        </button>
        <div class="chat-list" id="chatList"></div>
        <div style="margin-top: auto; font-size: 11px; color: var(--text-muted); text-align: center; border-top: 1px solid var(--border-color); pt-10">
            Diggolo AI Premium v2.5
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div onclick="toggleSidebar()" style="cursor:pointer; font-size: 20px;">‚ėį</div>
            <div class="logo">DIGGOLO-AI</div>
            <div style="width: 20px;"></div>
        </header>

        <div id="chat-window">
            </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="√éntreabńÉ-mńÉ orice..." rows="1" oninput="autoResize(this)"></textarea>
                <div id="sendBtn" class="send-btn" onclick="send()">‚ÜĎ</div>
            </div>
            <p style="font-size: 11px; text-align: center; color: var(--text-muted); margin-top: 12px;">
                Creat de Gruia. AI-ul poate genera informa»õii eronate.
            </p>
        </div>
    </main>

<script>
    const API_KEY = "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";
    let chats = JSON.parse(localStorage.getItem('diggolo_v10')) || [];
    let currentId = null;

    const BANNER = `‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖĄ ‚ĖÄ‚Ėą‚ĖÄ ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĒÄ‚ĒÄ‚ĒÄ ‚ĖĎ‚Ėą‚ĖÄ‚ĖÄ‚ĖÄ‚Ėą „ÄÄ ‚ĒÄ‚ĒÄ „ÄÄ ‚ĒÄ‚Ėą‚ĖÄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ 
‚ĖĎ‚Ėą‚ĒÄ‚ĖĎ‚Ėą ‚ĖĎ‚Ėą‚ĒÄ ‚ĖĎ‚Ėą‚ĒÄ‚ĖĄ‚ĖĄ ‚ĖĎ‚Ėą‚ĒÄ‚ĖĄ‚ĖĄ ‚ĖĎ‚Ėą‚ĒÄ‚ĒÄ‚ĖĎ‚Ėą ‚ĖĎ‚Ėą‚ĒÄ‚ĒÄ‚ĒÄ ‚ĖĎ‚Ėą‚ĒÄ‚ĒÄ‚ĖĎ‚Ėą „ÄÄ ‚ĖÄ‚ĖÄ „ÄÄ ‚ĖĎ‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĒÄ 
‚ĖĎ‚Ėą‚ĖĄ‚ĖĄ‚ĖÄ ‚ĖĄ‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĄ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ‚Ėą „ÄÄ ‚ĒÄ‚ĒÄ „ÄÄ ‚ĖĎ‚Ėą‚ĒÄ‚ĖĎ‚Ėą ‚ĖĄ‚Ėą‚ĖĄ`;

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function createNewChat() {
        const id = Date.now();
        chats.unshift({ 
            id, 
            title: "Chat Nou", 
            messages: [{ role: "system", content: "E»ôti Diggolo-AI, un asistent creat de Gruia. RńÉspunzi inteligent, politicos »ôi oferi cod corect formatat." }] 
        });
        save();
        loadChat(id);
        if(window.innerWidth < 768) toggleSidebar();
    }

    function loadChat(id) {
        currentId = id;
        const chat = chats.find(c => c.id === id);
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        chat.messages.forEach(m => {
            if(m.role !== 'system') addMsgUI(m.content, m.role);
        });
        renderList();
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        input.value = '';
        input.style.height = 'auto';
        addMsgUI(text, 'user');

        const chat = chats.find(c => c.id === currentId);
        chat.messages.push({ role: "user", content: text });
        
        // Efect de incarcare
        const loadingDiv = addMsgUI('<div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div>', 'ai');

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile", 
                    messages: chat.messages,
                    temperature: 0.7
                })
            });
            const data = await res.json();
            loadingDiv.remove();

            const reply = data.choices[0].message.content;
            chat.messages.push({ role: "assistant", content: reply });
            
            // Actualizam titlul chat-ului dupa primul mesaj
            if(chat.title === "Chat Nou") chat.title = text.substring(0, 30);
            
            addMsgUI(reply, 'ai');
            save();
        } catch (e) {
            loadingDiv.innerText = "Eroare: Nu am putut contacta serverul.";
        }
    }

    function addMsgUI(txt, role) {
        const win = document.getElementById('chat-window');
        const row = document.createElement('div');
        row.className = `message-row ${role}-row`;
        
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;

        if (role === 'ai') {
            // Logica avansata de parsare (Cod + Markdown Simplu)
            const parts = txt.split(/```/);
            parts.forEach((part, index) => {
                if (index % 2 === 1) {
                    const codeBlock = document.createElement('div');
                    codeBlock.className = 'code-block';
                    codeBlock.innerHTML = `
                        <div class="code-header"><span>Script</span><button class="copy-btn" onclick="copyCode(this)">Copy Code</button></div>
                        <pre><code><span style="color:#3b82f6; opacity:0.5">${BANNER}</span>\n\n${escapeHtml(part.trim())}</code></pre>
                    `;
                    div.appendChild(codeBlock);
                } else {
                    const content = document.createElement('div');
                    content.innerHTML = formatMarkdown(part);
                    div.appendChild(content);
                }
            });
        } else {
            div.innerText = txt;
        }

        row.appendChild(div);
        win.appendChild(row);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function formatMarkdown(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function copyCode(btn) {
        const code = btn.parentElement.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy Code", 2000);
    }

    function renderList() {
        const l = document.getElementById('chatList');
        l.innerHTML = '';
        chats.forEach(c => {
            const d = document.createElement('div');
            d.className = `chat-item ${c.id === currentId ? 'active' : ''}`;
            d.innerText = c.title;
            d.onclick = () => loadChat(c.id);
            l.appendChild(d);
        });
    }

    function save() { localStorage.setItem('diggolo_v10', JSON.stringify(chats)); renderList(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    // Init
    if(chats.length > 0) loadChat(chats[0].id); else createNewChat();
</script>
</body>
</html>
