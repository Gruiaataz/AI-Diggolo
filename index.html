<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI | Official</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --panel: #161616;
            --accent: #00ff88;
            --text: #ffffff;
            --user-bubble: #252525;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        /* Header */
        header { padding: 15px; text-align: center; border-bottom: 1px solid #222; background: var(--panel); font-weight: 800; letter-spacing: 1px; color: var(--accent); }

        /* Chat */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.3s ease; }
        .user-msg { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--panel); border-left: 3px solid var(--accent); border-bottom-left-radius: 4px; }

        /* Input Box */
        .input-container { position: fixed; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, var(--bg) 20%); }
        .input-wrapper { background: var(--panel); border: 1px solid #333; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 16px; outline: none; resize: none; max-height: 100px; }
        .send-btn { background: var(--accent); color: black; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>DIGGOLO AI</header>

    <div id="chat-window">
        <div class="msg ai-msg">Salut! Sunt Diggolo AI, creat de Gruia-Alex. Cu ce te ajut azi?</div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="Întreabă-mă ceva..." rows="1"></textarea>
            <button class="send-btn" onclick="askAI()">↑</button>
        </div>
    </div>

<script>
    // PUNE AICI TOKEN-UL DE LA HUGGING FACE (hf_...)
    const HF_TOKEN = "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"; 

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');

    async function askAI() {
        const text = userInput.value.trim();
        if(!text || !HF_TOKEN.startsWith("hf_")) return;

        // Reset input
        userInput.value = '';
        userInput.style.height = 'auto';

        // Mesaj Utilizator
        addMsg(text, 'user-msg');

        // Mesaj AI (Loading)
        const aiMsgDiv = addMsg("...", 'ai-msg');

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                headers: { 
                    Authorization: `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({ inputs: text, parameters: { max_new_tokens: 500 } }),
            });

            const data = await response.json();
            // Extragere text curat (Llama returnează uneori și input-ul înapoi)
            let reply = data[0].generated_text.replace(text, "").trim();
            
            aiMsgDiv.innerText = "";
            typeEffect(aiMsgDiv, reply);

        } catch (e) {
            aiMsgDiv.innerText = "Eroare la conexiune. Verifică Token-ul HF.";
        }
    }

    function addMsg(txt, className) {
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        div.innerText = txt;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }

    function typeEffect(element, text) {
        let i = 0;
        function step() {
            if (i < text.length) {
                element.innerText += text.charAt(i);
                i++;
                chatWindow.scrollTop = chatWindow.scrollHeight;
                setTimeout(step, 20);
            }
        }
        step();
    }

    // Auto-resize textarea
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
</script>
</body>
</html>
