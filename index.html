<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diggolo AI</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    padding: 18px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(15,23,42,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

#chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 16px;
    margin-bottom: 18px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
}

.user-msg {
    align-self: flex-end;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    border-bottom-right-radius: 4px;
}

.ai-msg {
    align-self: flex-start;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom-left-radius: 4px;
}

#input-area {
    padding: 20px;
    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    gap: 10px;
}

#userInput {
    flex: 1;
    resize: none;
    padding: 14px;
    border-radius: 14px;
    border: none;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.05);
    color: white;
}

#userInput::placeholder {
    color: rgba(255,255,255,0.4);
}

#sendBtn {
    padding: 14px 22px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #22d3ee, #3b82f6);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

#sendBtn:hover {
    transform: scale(1.05);
}

.response-text {
    white-space: pre-wrap;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<header>🤖 Diggolo AI</header>

<div id="chat-window"></div>

<div id="input-area">
    <textarea id="userInput" placeholder="Scrie un mesaj..." rows="1"></textarea>
    <button id="sendBtn">Trimite</button>
</div>

<script>
let history = [];

async function handleChat() {

    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    const aiBlock = createAIBlock();
    const responseArea = aiBlock.querySelector('.response-text');

    try {
        const response = await fetch("/chat", {   
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                messages: [...history, { role: "user", content: text }]
            })
        });

        const data = await response.json();

        await typeText(responseArea, data.reply);

        history.push(
            { role: "user", content: text },
            { role: "assistant", content: data.reply }
        );

    } catch (e) {
        responseArea.innerHTML =
            `<span style="color:#ff4d4d;">⚠️ Eroare server</span>`;
    }
}

async function typeText(el, text) {
    el.innerHTML = "";
    for (let char of text) {
        el.innerHTML += char;
        await new Promise(r => setTimeout(r, 10));
        document.getElementById('chat-window').scrollTop =
            document.getElementById('chat-window').scrollHeight;
    }
}

function createAIBlock() {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = "msg ai-msg";
    div.innerHTML = `<div class="response-text"></div>`;
    win.appendChild(div);
    return div;
}

function addMsg(text, role) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = `msg ${role}-msg`;
    div.innerText = text;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}

document.getElementById('sendBtn').onclick = handleChat;

document.getElementById('userInput').onkeydown = function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleChat();
    }
};

document.getElementById('userInput').oninput = function () {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
};
</script>

</body>
</html>
