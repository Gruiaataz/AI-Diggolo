<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerri-AI | all AI  v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #6366f1;
            --gemini-grad: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --glass: rgba(20, 20, 25, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Background animat */
        .nebula {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            z-index: -1; transition: 0.1s linear;
        }

        /* Sidebar */
        .sidebar {
            width: 280px; background: var(--glass); backdrop-filter: blur(30px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px;
        }

        .btn-new {
            background: var(--gemini-grad); border: none; color: white; padding: 14px;
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-new:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(155, 114, 203, 0.4); }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: -1px; background: var(--gemini-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }

        /* Mesaje */
        .msg { max-width: 85%; line-height: 1.6; animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { align-self: flex-end; background: #1f1f23; padding: 15px 22px; border-radius: 24px 24px 4px 24px; border: 1px solid var(--border); }
        .ai-msg { align-self: flex-start; width: 100%; border-left: 3px solid var(--accent); padding-left: 20px; }

        /* Imagine UI */
        .ai-image { max-width: 100%; border-radius: 15px; margin: 15px 0; border: 1px solid var(--border); transition: 0.3s; cursor: crosshair; }
        .ai-image:hover { border-color: var(--accent); }

        .image-tools { display: flex; gap: 10px; margin-bottom: 15px; }
        .tool-btn { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        /* Input Zone */
        .input-area { padding: 20px 15% 40px; }
        .input-box {
            background: rgba(40, 40, 45, 0.6); border: 1px solid var(--border); border-radius: 30px;
            padding: 10px 25px; display: flex; align-items: flex-end; gap: 15px; backdrop-filter: blur(20px);
        }

        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; padding: 12px 0; outline: none; resize: none; max-height: 150px; }
        .send-btn { background: white; color: black; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; }

        /* Code Format */
        pre { background: #000; padding: 20px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 13px; overflow-x: auto; border: 1px solid var(--border); color: #82aaff; }
    </style>
</head>
<body>

<div class="nebula" id="nebula"></div>

<aside class="sidebar">
    <div class="logo">Gerri Beta</div>
    <div style="margin-bottom: 30px;"></div>
    <button class="btn-new" onclick="location.reload()">+ Sesiune Nouă</button>
    <div style="flex:1"></div>
    <div style="font-size: 10px; color: #555; text-align: center;">CREATOR: GRUIA<br>v3.0.1 PRO</div>
</aside>

<main class="main">
    <header class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:10px; height:10px; background:#22c55e; border-radius:50%; box-shadow: 0 0 10px #22c55e;"></div>
            <span style="font-size:12px; font-weight:600; color:#22c55e;">SISTEM ONLINE</span>
        </div>
        <div style="font-size:12px; color:#888;">AI Multimodal (Text, Imagine, Editare)</div>
    </header>

    <div id="chat-window"></div>

    <div class="input-area">
        <div id="img-preview-box" style="display:none; padding:10px;">
            <img id="img-preview" src="" style="height:50px; border-radius:5px;">
            <span onclick="cancelImg()" style="cursor:pointer; color:red; margin-left:10px;">✕</span>
        </div>
        <div class="input-box">
            <label style="cursor:pointer; font-size:20px;">
                📷<input type="file" id="fileIn" hidden onchange="previewFile(this)">
            </label>
            <textarea id="userInput" placeholder="Scrie un mesaj sau cere o imagine (ex: 'Generează o poză cu...')" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <div class="send-btn" onclick="processInput()">↑</div>
        </div>
    </div>
</main>

<script>
    const GROQ_KEY = "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";
    const BANNER = `/* Gerri-AI | CREATED BY GRUIA */`;
    
    let messages = [{ role: "system", content: "Ești Gerri-AI, un asistent multimodal premium creat de Gruia. Dacă utilizatorul cere o imagine, răspunde scurt confirmând cererea. NU genera cod dacă nu e cerut explicit, trebuie sa faci totul frumos,organizay." }];
    let currentBase64 = null;

    // Nebula effect
    document.addEventListener('mousemove', e => {
        document.getElementById('nebula').style.setProperty('--x', e.clientX + 'px');
        document.getElementById('nebula').style.setProperty('--y', e.clientY + 'px');
    });

    function previewFile(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = e => {
            currentBase64 = e.target.result;
            document.getElementById('img-preview').src = currentBase64;
            document.getElementById('img-preview-box').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function cancelImg() {
        currentBase64 = null;
        document.getElementById('img-preview-box').style.display = 'none';
    }

    async function processInput() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text && !currentBase64) return;

        addMsgUI(text, 'user', currentBase64);
        input.value = ''; input.style.height = 'auto';

        // Logica Generare Imagine
        if(text.toLowerCase().includes("generează") || text.toLowerCase().includes("fă o poză") || text.toLowerCase().includes("imagine cu")) {
            addMsgUI("Generez imaginea solicitată folosind viziunea artistică Gerri...", 'ai');
            generateImage(text);
            cancelImg();
            return;
        }

        // Logica AI Chat (Text/Vision)
        const loading = addMsgUI("Analizez...", 'ai');
        
        let content = [{ type: "text", text: text || "Analizează imaginea asta." }];
        if(currentBase64) content.push({ type: "image_url", image_url: { url: currentBase64 } });

        messages.push({ role: "user", content: content });
        cancelImg();

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.2-11b-vision-preview", messages: messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            loading.remove();
            addMsgUI(reply, 'ai');
            messages.push({ role: "assistant", content: reply });
        } catch (e) { loading.innerText = "Eroare la procesare."; }
    }

    function generateImage(prompt) {
        const seed = Math.floor(Math.random() * 1000000);
        const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux`;
        
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "msg ai-msg";
        div.innerHTML = `
            <div>Iată imaginea generată pentru tine:</div>
            <div class="image-tools">
                <button class="tool-btn" onclick="applyFilter(this, 'grayscale(100%)')">B&W</button>
                <button class="tool-btn" onclick="applyFilter(this, 'sepia(100%)')">Sepia</button>
                <button class="tool-btn" onclick="applyFilter(this, 'invert(100%)')">Invert</button>
                <button class="tool-btn" onclick="applyFilter(this, 'none')">Reset</button>
            </div>
            <img src="${imgUrl}" class="ai-image" onload="this.scrollIntoView()">
        `;
        win.appendChild(div);
    }

    function applyFilter(btn, filter) {
        const img = btn.closest('.ai-msg').querySelector('.ai-image');
        img.style.filter = filter;
    }

    function addMsgUI(txt, role, img = null) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;

        if(img && role === 'user') {
            div.innerHTML = `<img src="${img}" style="max-width:200px; border-radius:10px;"><br>${txt}`;
        } else if(txt.includes("```")) {
            const parts = txt.split("```");
            div.innerHTML = parts[0] + `<pre><code>${BANNER}\n\n${parts[1].trim()}</code></pre>` + (parts[2] || "");
        } else {
            div.innerHTML = txt.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        }

        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }
</script>
</body>
</html>
