<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --bg-sidebar: #000000;
            --accent: #10a37f;
            --text-main: #ececec;
            --text-secondary: #b4b4b4;
            --border: #2d2d2d;
            --user-msg: #2f2f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px; transition: 0.3s;
        }
        .new-chat {
            border: 1px solid var(--border); padding: 12px; border-radius: 6px;
            cursor: pointer; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .new-chat:hover { background: #1a1a1a; }

        /* Main Chat Area */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        
        #chat-window {
            flex: 1; overflow-y: auto; padding: 40px 0;
            display: flex; flex-direction: column; scroll-behavior: smooth;
        }

        .message-row { width: 100%; display: flex; padding: 25px 15%; animation: fadeIn 0.3s ease; }
        .user-row { background: transparent; justify-content: flex-end; }
        .ai-row { background: rgba(255,255,255,0.02); }

        .bubble { max-width: 80%; line-height: 1.6; font-size: 16px; white-space: pre-wrap; }
        .user-bubble { background: var(--user-msg); padding: 10px 20px; border-radius: 20px; }
        .ai-bubble { width: 100%; position: relative; padding-left: 40px; }
        .ai-bubble::before {
            content: "D"; position: absolute; left: 0; top: 0;
            width: 30px; height: 30px; background: var(--accent);
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px;
        }

        /* Input Area */
        .input-container {
            padding: 20px 15% 40px; background: linear-gradient(transparent, var(--bg-dark) 50%);
        }
        .input-box {
            background: #212121; border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 15px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        textarea {
            flex: 1; background: transparent; border: none; color: white;
            font-size: 16px; outline: none; resize: none; max-height: 200px;
        }
        .send-btn {
            background: var(--accent); color: white; width: 32px; height: 32px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0.5; transition: 0.3s; margin-left: 10px;
        }
        .send-btn.active { opacity: 1; }

        /* Code Blocks */
        .code-block {
            background: #000; border-radius: 8px; margin: 15px 0; border: 1px solid var(--border);
        }
        .code-header {
            padding: 8px 15px; background: #2d2d2d; font-size: 12px;
            display: flex; justify-content: space-between; border-radius: 8px 8px 0 0;
        }
        .code-content { padding: 15px; font-family: 'Fira Code', monospace; overflow-x: auto; font-size: 14px; color: #d1d1d1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .message-row { padding: 20px 5%; }
            .input-container { padding: 15px 10px 20px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="new-chat" onclick="location.reload()"><span>+</span> New Chat</div>
    <div style="margin-top: auto; font-size: 12px; color: var(--text-secondary); text-align: center;">
        © 2026 Diggolo AI | Gruia
    </div>
</aside>

<main>
    <div id="chat-window"></div>
    
    <div class="input-container">
        <div class="input-box">
            <textarea id="userInput" placeholder="Mesaj către Diggolo AI..." rows="1"></textarea>
            <div id="sendBtn" class="send-btn" onclick="sendMessage()">↑</div>
        </div>
        <p style="font-size: 11px; text-align: center; color: var(--text-secondary); margin-top: 10px;">
            Diggolo AI poate oferi informații eronate. Verificați datele importante.
        </p>
    </div>
</main>

<script>
    const API_KEY = "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";
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let history = [{role: "system", content: "Ești Diggolo AI, un asistent creat de Gruia-Alex. Ești politicos, inteligent și ajuți utilizatorii cu orice task."}];

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
        sendBtn.classList.toggle('active', userInput.value.trim() !== '');
    });

    userInput.addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    function createMessageRow(role) {
        const row = document.createElement('div');
        row.className = `message-row ${role}-row`;
        const bubble = document.createElement('div');
        bubble.className = `bubble ${role}-bubble`;
        row.appendChild(bubble);
        chatWindow.appendChild(row);
        return bubble;
    }

    async function typeWriter(element, text) {
        const parts = text.split("```");
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) { // Bloc de cod
                const codeContent = parts[i].trim();
                const container = document.createElement('div');
                container.className = 'code-block';
                container.innerHTML = `<div class="code-header"><span>Script</span></div><div class="code-content">${codeContent}</div>`;
                element.appendChild(container);
            } else { // Text normal
                const span = document.createElement('span');
                element.appendChild(span);
                const words = parts[i].split(" ");
                for (let word of words) {
                    span.innerText += word + " ";
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    await new Promise(r => setTimeout(r, 40));
                }
            }
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if(!text) return;

        // User message
        userInput.value = '';
        userInput.style.height = 'auto';
        const userBubble = createMessageRow('user');
        userBubble.innerText = text;

        // AI Thinking
        const aiBubble = createMessageRow('ai');
        aiBubble.innerText = "● ● ●";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch("[https://api.groq.com/openai/v1/chat/completions](https://api.groq.com/openai/v1/chat/completions)", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [...history, {role: "user", content: text}],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            aiBubble.innerText = "";
            await typeWriter(aiBubble, reply);
            
            history.push({role: "user", content: text});
            history.push({role: "assistant", content: reply});

        } catch (error) {
            aiBubble.innerText = "Eroare: Nu am putut contacta creierul AI. Verifică conexiunea.";
        }
    }
</script>

</body>
</html>
