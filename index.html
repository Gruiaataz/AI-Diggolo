<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI 5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --sidebar: #000000;
            --accent: #10a37f;
            --text: #ececec;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .new-chat { border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; margin-bottom: 20px; transition: background 0.2s; }
        .new-chat:hover { background: #1a1a1a; }

        main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        #chat-window { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }

        .row { width: 100%; display: flex; padding: 25px 15%; animation: fadeIn 0.3s ease; }
        .user-row { justify-content: flex-end; }
        .ai-row { background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

        .bubble { max-width: 90%; line-height: 1.7; font-size: 16px; }
        .user-bubble { background: #2f2f2f; padding: 12px 20px; border-radius: 20px; }
        .ai-bubble { width: 100%; color: #d1d1d1; }

        .code-container { background: #000; border-radius: 10px; margin: 15px 0; border: 1px solid var(--border); overflow: hidden; }
        .code-header { background: #2d2d2d; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #aaa; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 11px; }
        .code-content { padding: 15px; font-family: 'Fira Code', monospace; overflow-x: auto; font-size: 14px; color: #74f9ff; white-space: pre; }

        .input-area { position: absolute; bottom: 0; width: 100%; padding: 20px 15%; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-wrapper { background: #212121; border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; max-height: 150px; }
        .send-btn { background: var(--accent); border: none; color: white; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 10px; display: flex; align-items: center; justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .row { padding: 20px 5%; }
            .input-area { padding: 15px 10px 30px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="new-chat" onclick="location.reload()">+ New Chat</div>
    <div style="margin-top:auto; font-size:11px; color:gray; text-align:center;">Diggolo AI 5.0 | Gruia-Alex</div>
</aside>

<main>
    <div id="chat-window">
        <div class="row ai-row">
            <div class="bubble ai-bubble">Salutare! Sunt <b>Diggolo AI 5.0</b>. Sunt online și pregătit să te ajut. Ce dorești să discutăm?</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="Trimite un mesaj..." rows="1"></textarea>
            <button class="send-btn" onclick="askAI()">↑</button>
        </div>
    </div>
</main>

<script>
    const API_KEY = "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"; 

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');

    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    async function askAI() {
        const text = userInput.value.trim();
        if(!text) return;

        userInput.value = '';
        userInput.style.height = 'auto';

        addMsg(text, 'user');
        const aiBubble = addMsg("...", 'ai');

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                headers: { 
                    Authorization: `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({ 
                    inputs: `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\n${text}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`, 
                    parameters: { max_new_tokens: 1000, stop: ["<|eot_id|>"] } 
                }),
            });

            const data = await response.json();
            
            if (data.error && data.error.includes("currently loading")) {
                aiBubble.innerText = "Sistemul se inițializează... revin imediat.";
                setTimeout(() => askAI_Retry(text, aiBubble), 5000);
                return;
            }

            let fullText = data[0].generated_text.split("<|start_header_id|>assistant<|end_header_id|>")[1].trim();
            aiBubble.innerHTML = "";
            await typeWriter(aiBubble, fullText);

        } catch (e) {
            aiBubble.innerText = "Eroare: Nu am putut contacta creierul AI. Verifică cheia și conexiunea.";
        }
    }

    async function askAI_Retry(text, bubbleElement) {
        try {
            const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                headers: { Authorization: `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({ inputs: `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\n${text}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`, parameters: { max_new_tokens: 1000 } }),
            });
            const data = await response.json();
            let fullText = data[0].generated_text.split("<|start_header_id|>assistant<|end_header_id|>")[1].trim();
            bubbleElement.innerHTML = "";
            await typeWriter(bubbleElement, fullText);
        } catch (e) {
            bubbleElement.innerText = "Eroare la reîncercare.";
        }
    }

    function addMsg(txt, type) {
        const row = document.createElement('div');
        row.className = `row ${type}-row`;
        const bubble = document.createElement('div');
        bubble.className = `bubble ${type}-bubble`;
        bubble.innerText = txt;
        row.appendChild(bubble);
        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return bubble;
    }

    async function typeWriter(element, text) {
        const parts = text.split(/```/);
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                const content = parts[i].trim();
                const container = document.createElement('div');
                container.className = 'code-container';
                container.innerHTML = `<div class="code-header"><span>Script</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><div class="code-content">${content}</div>`;
                element.appendChild(container);
            } else {
                const words = parts[i].split(" ");
                for (let word of words) {
                    element.innerHTML += word + " ";
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    await new Promise(r => setTimeout(r, 40));
                }
            }
        }
    }

    function copyCode(btn) {
        const code = btn.parentElement.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy", 2000);
    }

    userInput.addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            askAI();
        }
    });
</script>
</body>
</html>
