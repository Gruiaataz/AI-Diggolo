<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Diggolo | By Gruia-Alexandru</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 95%; max-width: 450px; height: 80vh; background: var(--card); border-radius: 12px; display: flex; flex-direction: column; border: 1px solid #30363d; overflow: hidden; }
        header { padding: 15px; background: #21262d; text-align: center; border-bottom: 1px solid #30363d; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; font-size: 14px; max-width: 80%; }
        .user { background: #238636; align-self: flex-end; }
        .ai { background: #30363d; align-self: flex-start; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #30363d; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #0d1117; color: white; }
        button { margin-left: 10px; padding: 10px 20px; background: var(--accent); border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="chat-container">
    <header><strong>AI-Diggolo</strong><br><small>Creat de Gruia-Alexandru</small></header>
    <div id="chat-box"><div class="msg ai">Salut, Gruia! Sunt gata de treabă. Scrie-mi orice!</div></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Mesaj...">
        <button id="sendBtn">Trimite</button>
    </div>
</div>

<script>
    const box = document.getElementById('chat-box');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    // TOKEN-UL TĂU DIN IMAGINEA 1
    const HF_TOKEN = "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";
    const MODEL = "facebook/blenderbot-400M-distill"; 

    async function askAI() {
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";
        const loading = addMsg("Se gândește...", 'ai');

        try {
            const res = await fetch(`https://api-inference.huggingface.co/models/${MODEL}`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text, options: { wait_for_model: true } }) // ASTA REZOLVĂ EROAREA
            });

            const data = await res.json();
            if(data.error) {
                loading.innerText = "Sistemul se încarcă... Mai apasă o dată în 10 secunde.";
            } else {
                loading.innerText = data.generated_text || data[0].generated_text;
            }
        } catch (e) {
            loading.innerText = "Eroare! Dă un Refresh la pagină și mai încearcă.";
        }
    }

    function addMsg(t, c) {
        const d = document.createElement('div');
        d.className = 'msg ' + c;
        d.innerText = t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    btn.onclick = askAI;
    input.onkeydown = (e) => { if(e.key === 'Enter') askAI(); };
</script>
</body>
</html>
