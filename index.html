<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI | Official Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #000000;
            --accent: #6366f1;
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; width: 100%; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; transition: transform 0.3s ease; z-index: 2000; }
        .mobile-nav { display: none; position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 1500; }
        
        /* Layout */
        main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; background: var(--bg); }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15% 120px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
        
        /* Mesaje */
        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #1e1e20; padding: 12px 20px; border-radius: 20px 20px 4px 20px; border: 1px solid var(--border); color: #fff; }
        .ai-msg { align-self: flex-start; width: 100%; border-left: 3px solid var(--accent); padding-left: 20px; color: #e2e8f0; }
        
        /* Imagini Fix */
        .ai-msg img { max-width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid var(--border); display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Code Block */
        .code-container { background: #0d0d0e; border-radius: 12px; border: 1px solid var(--border); margin: 15px 0; overflow: hidden; width: 100%; }
        .code-header { background: #1a1a1b; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #94a3b8; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .copy-btn:hover { opacity: 0.9; }
        .code-content { padding: 20px; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: 13.5px; color: #d1d5db; white-space: pre; line-height: 1.5; }

        /* Input Area - Fixat Jos */
        .input-container { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 15% 40px; background: linear-gradient(to top, var(--bg) 70%, transparent); }
        .input-card { background: #111113; border: 1px solid var(--border); border-radius: 24px; padding: 10px 16px; display: flex; align-items: flex-end; gap: 12px; transition: 0.2s; box-shadow: 0 -10px 40px rgba(0,0,0,0.4); }
        .input-card:focus-within { border-color: var(--accent); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; min-height: 24px; max-height: 200px; padding: 8px 0; line-height: 1.5; }
        .send-btn { background: #fff; color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-bottom: 4px; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.05); }

        /* Modals & Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; transform: translateX(-100%); height: 100%; }
            .sidebar.active { transform: translateX(0); }
            .mobile-nav { display: flex; }
            #chat-window { padding: 80px 5% 140px; }
            .input-container { padding: 10px 10px 30px; }
        }
    </style>
</head>
<body>

    <nav class="mobile-nav">
        <div style="font-weight:800; background:var(--accent-grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">DIGGOLO AI</div>
        <button onclick="toggleSidebar()" style="background:transparent; border:none; color:white; font-size:24px;">☰</button>
    </nav>

    <aside class="sidebar" id="sidebar">
        <div style="font-size: 24px; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; text-align: center;">DIGGOLO AI</div>
        <button onclick="location.reload()" style="width:100%; padding:12px; border-radius:12px; background:var(--accent-grad); border:none; color:white; font-weight:700; cursor:pointer; margin-bottom:10px;">➕ Sesiune Nouă</button>
        <button onclick="openAbout()" style="width:100%; padding:12px; border-radius:12px; background:var(--glass); border:1px solid var(--border); color:white; cursor:pointer;">👤 Despre Fondator</button>
        <div style="margin-top:auto; font-size:10px; color:#444; text-align:center;">© 2026 DIGGOLO AI | GRUIA</div>
    </aside>

    <main>
        <div id="chat-window"></div>
        <div class="input-container">
            <div class="input-card">
                <textarea id="userInput" placeholder="Întreabă-mă orice..." rows="1"></textarea>
                <div class="send-btn" onclick="handleChat()">↑</div>
            </div>
        </div>
    </main>

    <div id="about-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#111; border:1px solid var(--border); border-radius:28px; width:100%; max-width:400px; padding:40px 25px; text-align:center;">
            <img src="https://image2url.com/r2/default/images/1771939861745-85e6d796-43d3-4bc4-8836-35b7d1e69b13.png" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent); margin-bottom:20px; object-fit:cover;">
            <h2 style="margin-bottom:5px;">Gruia</h2>
            <p style="color:var(--accent); font-weight:700; font-size:12px; text-transform:uppercase; margin-bottom:15px;">Fondator: DiggoloAI-Gruia</p>
            <p style="font-size:14px; color:#94a3b8; line-height:1.6; margin-bottom:20px;">Diggolo AI este un proiect premium creat de Gruia-Alex pentru a oferi cea mai bună experiență AI.</p>
            <button onclick="closeAbout()" style="width:100%; background:#fff; color:#000; border:none; padding:12px; border-radius:12px; font-weight:700; cursor:pointer;">Închide</button>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let history = [];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function openAbout() { document.getElementById('about-modal').style.display = 'flex'; }
    function closeAbout() { document.getElementById('about-modal').style.display = 'none'; }

    async function typeText(element, text) {
        element.innerHTML = "";
        const parts = text.split(/```/);
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                const code = parts[i].trim();
                const container = document.createElement('div');
                container.className = 'code-container';
                container.innerHTML = `<div class="code-header"><span>Script</span><button class="copy-btn" onclick="copyCode(this)">Copy Script</button></div><div class="code-content">${code}</div>`;
                element.appendChild(container);
            } else {
                const words = parts[i].split(" ");
                for (let word of words) {
                    element.innerHTML += word.replace(/\n/g, '<br>') + " ";
                    await new Promise(r => setTimeout(r, 35));
                    document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                }
            }
        }
    }

    function copyCode(btn) {
        const code = btn.parentElement.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "Copiat!";
        setTimeout(() => btn.innerText = "Copy Script", 2000);
    }

    async function handleChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';
        input.style.height = 'auto';

        const aiBlock = createAIBlock();
        const responseArea = aiBlock.querySelector('.response-text');
        const lowerText = text.toLowerCase();

        if (lowerText.includes("gruia")) {
            const reply = lowerText.includes("nu") ? "Te contrazic. **Gruia-Alex** este Fondatorul și Creatorul meu oficial." : "Desigur! **Gruia** este Fondatorul Diggolo AI și cel care m-a creat.";
            await typeText(responseArea, reply);
            return;
        }

        if(lowerText.includes("generează") || lowerText.includes("imagine") || lowerText.includes("poză")) {
            responseArea.innerHTML = "🎨 *Generez imaginea cerută...*";
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${Math.floor(Math.random()*1000)}&model=flux`;
            const img = new Image();
            img.src = imgUrl;
            img.onload = () => { responseArea.innerHTML = `Iată ce am creat:<br><img src="${imgUrl}">`; };
            return;
        }

        try {
            const res = await fetch("[https://api.groq.com/openai/v1/chat/completions](https://api.groq.com/openai/v1/chat/completions)", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [...history, {role: "user", content: text}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            await typeText(responseArea, reply);
            history.push({role: "user", content: text}, {role: "assistant", content: reply});
        } catch(e) { responseArea.innerText = 'Eroare conexiune.'; }
    }

    function createAIBlock() {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "msg ai-msg";
        div.innerHTML = `<div class="response-text">...</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function addMsg(t, r) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${r}-msg`;
        div.innerText = t;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    document.getElementById('userInput').addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChat(); }
    });
</script>
</body>
</html>
