<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo-AI | Creator: Gruia</title>
    <style>
        :root {
            --bg: #09090b;
            --sidebar: rgba(17, 17, 19, 0.95);
            --accent: #3b82f6;
            --card: rgba(28, 28, 31, 0.8);
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --border: #27272a;
            --code-bg: #000000;
        }

        body.default { --grad1: #09090b; --grad2: #1e1b4b; --accent: #3b82f6; }
        body.theme-blue { --grad1: #0f172a; --grad2: #075985; --accent: #38bdf8; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(135deg, var(--grad1), var(--grad2));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text); display: flex; height: 100vh; width: 100vw; overflow: hidden; 
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #bg-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.5; }

        .sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 15px; z-index: 100; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            #chat-window { padding: 20px 10px !important; }
            .input-area { padding: 10px 10px 25px !important; }
        }

        .new-chat { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--muted); background: rgba(255,255,255,0.05); }
        .chat-item.active { background: var(--card); color: white; border: 1px solid var(--accent); }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; height: 100%; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .menu-toggle { display: none; font-size: 24px; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        #chat-window { flex: 1; padding: 30px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .msg { max-width: 90%; padding: 14px 18px; border-radius: 20px; line-height: 1.6; font-size: 15px; animation: msgSlide 0.3s ease; position: relative; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; width: fit-content; max-width: 95%; }

        /* CODE FORMAT */
        .code-container {
            background: var(--code-bg);
            border-radius: 8px;
            margin: 10px 0;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .code-header {
            background: #2d2d2d;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #ccc;
        }
        .copy-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
        pre {
            padding: 15px;
            overflow-x: auto;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.5;
            white-space: pre;
        }
        .ascii-banner {
            color: var(--accent);
            font-size: 11px;
            display: block;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .input-area { padding: 20px 15% 40px; }
        .input-box { background: #1c1c1f; border: 1px solid var(--border); border-radius: 25px; display: flex; padding: 10px 20px; align-items: flex-end; }
        #userInput { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 5px 0; resize: none; max-height: 150px; }
        #sendBtn { background: var(--accent); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 12px; flex-shrink: 0; }
    </style>
</head>
<body class="default">

    <canvas id="bg-canvas"></canvas>

    <div class="sidebar" id="sidebar">
        <button class="new-chat" onclick="createNewChat()">+ Chat Nou</button>
        <div class="chat-list" id="chatList"></div>
        <div style="font-size: 10px; color: var(--muted); text-align: center; margin-top: auto; padding: 10px;">Diggolo-AI v2 | Gruia</div>
    </div>

    <div class="main">
        <div class="header">
            <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
            <h2 style="font-size: 16px; letter-spacing: 1px;">DIGGOLO-AI</h2>
            <div style="width: 24px;"></div>
        </div>
        <div id="chat-window" onclick="closeSidebar()"></div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="userInput" placeholder="Mesaj..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <div id="sendBtn" onclick="send()">➤</div>
            </div>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let chats = JSON.parse(localStorage.getItem('diggolo_v9')) || [];
    let currentId = null;

    const BANNER_TEXT = `░█▀▀▄ ▀█▀ ░█▀▀█ ░█▀▀█ ░█▀▀▀█ ░█─── ░█▀▀▀█ 　 ── 　 ─█▀▀█ ▀█▀ 
░█─░█ ░█─ ░█─▄▄ ░█─▄▄ ░█──░█ ░█─── ░█──░█ 　 ▀▀ 　 ░█▄▄█ ░█─ 
░█▄▄▀ ▄█▄ ░█▄▄█ ░█▄▄█ ░█▄▄▄█ ░█▄▄█ ░█▄▄▄█ 　 ── 　 ░█─░█ ▄█▄ v2 - Owner Gruia`;

    const SYSTEM_PROMPT = `Ești Diggolo-AI, creat de Gruia. Răspunzi clar și direct. Când scrii cod, folosește neapărat formatul \`\`\`codul tau aici\`\`\`.`;

    function init() {
        if(chats.length > 0) loadChat(chats[0].id); else createNewChat();
        renderList();
    }

    function createNewChat() {
        const id = Date.now();
        chats.unshift({ id, title: "Chat Nou", messages: [{ role: "system", content: SYSTEM_PROMPT }] });
        save(); loadChat(id);
    }

    function loadChat(id) {
        currentId = id;
        const chat = chats.find(c => c.id === id);
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        chat.messages.forEach(m => { if(m.role !== 'system') addMsgUI(m.content, m.role); });
        renderList();
    }

    async function send() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;

        addMsgUI(val, 'user');
        input.value = ''; input.style.height = 'auto';
        const loading = addMsgUI("...", 'ai');

        const chat = chats.find(c => c.id === currentId);
        chat.messages.push({ role: "user", content: val });

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chat.messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            chat.messages.push({ role: "assistant", content: reply });
            loading.remove();
            addMsgUI(reply, 'ai');
            save();
        } catch (e) { loading.innerText = "Eroare conexiune."; }
    }

    function addMsgUI(txt, role) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;

        if (role === 'ai') {
            const parts = txt.split(/```/);
            parts.forEach((part, index) => {
                if (index % 2 === 1) {
                    const container = document.createElement('div');
                    container.className = 'code-container';
                    container.innerHTML = `
                        <div class="code-header"><span>Script</span><button class="copy-btn" onclick="copyFullScript(this)">Copy</button></div>
                        <pre><span class="ascii-banner">${BANNER_TEXT}</span>\n\n${part.trim()}</pre>
                    `;
                    div.appendChild(container);
                } else {
                    const span = document.createElement('span');
                    span.innerText = part;
                    div.appendChild(span);
                }
            });
        } else { div.innerText = txt; }

        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    // FUNCȚIA CARE COPIAZĂ TOT (BANNER + COD)
    function copyFullScript(btn) {
        const pre = btn.parentElement.nextElementSibling;
        const textToCopy = pre.innerText; // Aceasta ia și banner-ul și codul
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            btn.innerText = "Copied!";
            btn.style.background = "#22c55e";
            setTimeout(() => { 
                btn.innerText = "Copy"; 
                btn.style.background = "var(--accent)";
            }, 2000);
        });
    }

    function renderList() {
        const l = document.getElementById('chatList');
        l.innerHTML = '';
        chats.forEach(c => {
            const d = document.createElement('div');
            d.className = `chat-item ${c.id === currentId ? 'active' : ''}`;
            d.innerText = c.title.substring(0, 25);
            d.onclick = () => loadChat(c.id);
            l.appendChild(d);
        });
    }

    function save() { localStorage.setItem('diggolo_v9', JSON.stringify(chats)); renderList(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

    // Stele Canvas Animatie
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class Star {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*1.5; this.v = Math.random()*0.3+0.1; }
        u() { this.y += this.v; if(this.y > canvas.height) this.y = -10; }
        d() { ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
    }
    for(let i=0; i<70; i++) particles.push(new Star());
    function anim() { ctx.clearRect(0,0,canvas.width, canvas.height); particles.forEach(p=>{p.u();p.d();}); requestAnimationFrame(anim); }
    anim();
    init();
</script>
</body>
</html>
