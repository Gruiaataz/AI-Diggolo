<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggolo AI | Official Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #000000;
            --accent: #6366f1;
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 30px 20px;
        }

        .logo-container { margin-bottom: 30px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Grup de butoane sus */
        .actions-top { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        
        .action-btn {
            padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--glass); color: white; cursor: pointer; font-size: 12px;
            font-weight: 600; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .btn-primary { background: var(--accent-grad); border: none; }

        /* ABOUT MODAL (INFO CARD) */
        #about-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }
        .about-card {
            background: #111; border: 1px solid var(--border); border-radius: 28px;
            width: 100%; max-width: 450px; padding: 40px 30px; text-align: center; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .profile-img {
            width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent);
            margin: 0 auto 20px; object-fit: cover; background: #222; display: block;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        .about-name { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .about-title { color: var(--accent); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .about-desc { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 25px; }
        .close-about { background: #222; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        /* CHAT WINDOW */
        #chat-window { flex: 1; overflow-y: auto; padding: 50px 18%; display: flex; flex-direction: column; gap: 30px; }
        .msg { max-width: 85%; line-height: 1.6; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { align-self: flex-end; background: #1e1e20; padding: 14px 22px; border-radius: 20px 20px 4px 20px; border: 1px solid var(--border); }
        .ai-msg { align-self: flex-start; width: 100%; border-left: 3px solid var(--accent); padding-left: 20px; }

        .input-area { padding: 30px 18% 50px; }
        .input-card { background: #111113; border: 1px solid var(--border); border-radius: 24px; padding: 12px 24px; display: flex; align-items: center; gap: 15px; }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; }
        .send-btn { background: white; color: black; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo">DIGGOLO AI</div>
        </div>

        <div class="actions-top">
            <button class="action-btn btn-primary" onclick="location.reload()">
                <span>➕</span>
                <span>Nou</span>
            </button>
            <button class="action-btn" onclick="openAbout()">
                <span>👤</span>
                <span>Despre</span>
            </button>
        </div>

        <div style="flex:1">
            <p style="font-size: 12px; color: #444; margin-bottom: 10px; font-weight: 600;">FUNCȚII</p>
            <button class="nav-btn" style="width:100%; text-align:left; background:transparent; border:none; color:#888; padding:10px 0; cursor:pointer;" onclick="alert('Setări în curând')">⚙️ Setări Sistem</button>
            <button class="nav-btn" style="width:100%; text-align:left; background:transparent; border:none; color:#888; padding:10px 0; cursor:pointer;">📁 Istoric Chat</button>
        </div>

        <div style="font-size: 10px; color: #333; text-align: center; border-top: 1px solid #111; pt: 20px;">
            © 2026 DIGGOLO AI | GRUIA
        </div>
    </aside>

    <main style="flex:1; display:flex; flex-direction:column;">
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-card">
                <textarea id="userInput" placeholder="Scrie ceva sau generează o imagine..." rows="1"></textarea>
                <div class="send-btn" onclick="handleChat()">↑</div>
            </div>
        </div>
    </main>

    <div id="about-modal">
        <div class="about-card">
            <img src="https://via.placeholder.com/150" alt="Gruia" class="profile-img">
            <div class="about-name">Gruia</div>
            <div class="about-title">Fondator: DiggoloAI-Gruia</div>
            <div class="about-desc">
                Vizionarul din spatele Diggolo AI. Am construit această platformă pentru a integra cele mai avansate modele de limbaj (Llama 3.3) și generație de imagini (Flux-1) într-o interfață premium, accesibilă oricui.
            </div>
            <button class="close-about" onclick="closeAbout()">Am înțeles</button>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let history = [];

    function openAbout() { document.getElementById('about-modal').style.display = 'flex'; }
    function closeAbout() { document.getElementById('about-modal').style.display = 'none'; }

    async function handleChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';

        const aiBlock = createAIBlock();
        const responseArea = aiBlock.querySelector('.response-text');

        if(text.toLowerCase().includes("generează") || text.toLowerCase().includes("imagine")) {
            responseArea.innerHTML = "🎨 <i>Creez imaginea cerută...</i>";
            setTimeout(() => {
                const seed = Math.floor(Math.random() * 999999);
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${seed}&model=flux`;
                responseArea.innerHTML = `<img src="${imgUrl}" style="width:100%; border-radius:15px; border:1px solid #333; margin-top:10px;">`;
            }, 2500);
            return;
        }

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [...history, {role: "user", content: text}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            responseArea.innerHTML = reply.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            history.push({role: "user", content: text}, {role: "assistant", content: reply});
        } catch(e) {
            responseArea.innerText = 'Eroare la conexiune.';
        }
    }

    function createAIBlock() {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "msg ai-msg";
        div.innerHTML = `<div class="response-text">...</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function addMsg(t, r) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${r}-msg`;
        div.innerText = t;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChat(); } });
</script>
</body>
</html>
