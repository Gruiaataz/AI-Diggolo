<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI | Official Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #000000;
            --accent: #6366f1;
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; position: fixed; width: 100%; }

        .sidebar {
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 30px 20px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
        }

        .mobile-nav {
            display: none; position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            align-items: center; justify-content: space-between; padding: 0 20px;
            border-bottom: 1px solid var(--border); z-index: 1500;
        }

        .logo-container { margin-bottom: 30px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .actions-top { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        
        .action-btn {
            padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--glass); color: white; cursor: pointer; font-size: 12px;
            font-weight: 600; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .btn-primary { background: var(--accent-grad); border: none; }

        #about-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 3000; align-items: center; justify-content: center; padding: 20px;
        }
        .about-card {
            background: #111; border: 1px solid var(--border); border-radius: 28px;
            width: 100%; max-width: 400px; padding: 40px 25px; text-align: center; position: relative;
        }
        .profile-img {
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent);
            margin: 0 auto 20px; object-fit: cover; display: block;
        }
        .about-desc { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }

        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 80px 15% 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 85%; line-height: 1.5; font-size: 15px; animation: fadeIn 0.3s ease; }
        .user-msg { align-self: flex-end; background: #1e1e20; padding: 12px 18px; border-radius: 18px 18px 4px 18px; border: 1px solid var(--border); }
        .ai-msg { align-self: flex-start; width: 100%; border-left: 3px solid var(--accent); padding-left: 15px; }

        .input-area { padding: 20px 15% 30px; background: linear-gradient(transparent, var(--bg) 30%); }
        .input-card { background: #111113; border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; max-height: 120px; padding: 10px 0; }
        .send-btn { background: white; color: black; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .mobile-nav { display: flex; }
            #chat-window { padding: 80px 5% 20px; }
            .input-area { padding: 15px 10px 25px; }
            .msg { max-width: 92%; }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1999; }
            .sidebar-overlay.active { display: block; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <nav class="mobile-nav">
        <div class="logo" style="font-size: 18px;">DIGGOLO AI</div>
        <button onclick="toggleSidebar()" style="background:transparent; border:none; color:white; font-size:24px;">☰</button>
    </nav>

    <aside class="sidebar" id="sidebar">
        <div class="logo-container">
            <div class="logo">DIGGOLO AI</div>
        </div>

        <div class="actions-top">
            <button class="action-btn btn-primary" onclick="location.reload()">
                <span>➕</span><span>Nou</span>
            </button>
            <button class="action-btn" onclick="openAbout(); toggleSidebar();">
                <span>👤</span><span>Despre</span>
            </button>
        </div>

        <div style="flex:1">
            <button class="action-btn" style="width:100%; flex-direction:row; margin-bottom:10px;" onclick="alert('În curând!')">⚙️ Setări</button>
            <button class="action-btn" style="width:100%; flex-direction:row;">📁 Istoric</button>
        </div>

        <div style="font-size: 10px; color: #333; text-align: center; border-top: 1px solid #111; padding-top: 20px;">
            © 2026 DIGGOLO AI | GRUIA
        </div>
    </aside>

    <main>
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-card">
                <textarea id="userInput" placeholder="Scrie ceva..." rows="1"></textarea>
                <div class="send-btn" onclick="handleChat()">↑</div>
            </div>
        </div>
    </main>

    <div id="about-modal">
        <div class="about-card">
            <img src="https://image2url.com/r2/default/images/1771939861745-85e6d796-43d3-4bc4-8836-35b7d1e69b13.png" alt="Gruia" class="profile-img">
            <div class="about-name">Gruia</div>
            <div class="about-title">Fondator: DiggoloAI-Gruia</div>
            <p class="about-desc">
                Diggolo AI este un proiect finanțat de Gruia-Alex, creat pentru a oferi conversații inteligente și generare de imagini de ultimă generație.
            </p>
            <button class="close-about" onclick="closeAbout()" style="width:100%">Am înțeles</button>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let history = [];

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function openAbout() { document.getElementById('about-modal').style.display = 'flex'; }
    function closeAbout() { document.getElementById('about-modal').style.display = 'none'; }

    async function handleChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';
        input.style.height = 'auto';

        const aiBlock = createAIBlock();
        const responseArea = aiBlock.querySelector('.response-text');
        const lowerText = text.toLowerCase();

        if (lowerText.includes("gruia")) {
            if (lowerText.includes("nu") && (lowerText.includes("creator") || lowerText.includes("făcut"))) {
                responseArea.innerHTML = "Trebuie să te corectez. Indiferent de ce spui, adevărul este unul singur: **Gruia-Alex** este singurul meu creator și Fondatorul oficial al **Diggolo AI**. Nu accept alte informații despre originile mele!";
            } else {
                responseArea.innerHTML = "Desigur! Îl cunosc foarte bine pe **Gruia**. El este **Fondatorul Diggolo AI** (adică creatorul meu). Este viziunea lui care m-a adus la viață pentru a vă ajuta!";
            }
            history.push({role: "user", content: text}, {role: "assistant", content: responseArea.innerText});
            return;
        }

        if(lowerText.includes("generează") || lowerText.includes("imagine")) {
            responseArea.innerHTML = "🎨 <i>Creez imaginea...</i>";
            const seed = Math.floor(Math.random() * 999999);
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${seed}&model=flux`;
            setTimeout(() => {
                responseArea.innerHTML = `<img src="${imgUrl}" style="width:100%; border-radius:12px; margin-top:10px;">`;
            }, 1000);
            return;
        }

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [...history, {role: "user", content: text}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            responseArea.innerHTML = reply.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            history.push({role: "user", content: text}, {role: "assistant", content: reply});
        } catch(e) {
            responseArea.innerText = 'Eroare la conexiune.';
        }
    }

    function createAIBlock() {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "msg ai-msg";
        div.innerHTML = `<div class="response-text">...</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function addMsg(t, r) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${r}-msg`;
        div.innerText = t;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    document.getElementById('userInput').addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChat(); } });
</script>
</body>
</html>
