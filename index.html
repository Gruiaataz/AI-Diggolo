<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggolo-AI Standard</title>
    <style>
        :root {
            --bg: #09090b;
            --sidebar: #111113;
            --accent: #3b82f6;
            --card: #1c1c1f;
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --border: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; transition: 0.3s; }
        .new-chat { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 15px; transition: 0.2s; }
        .new-chat:hover { opacity: 0.9; transform: translateY(-1px); }

        .search-container { position: relative; margin-bottom: 20px; }
        .search-container input { width: 100%; background: #18181b; border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: white; font-size: 14px; outline: none; }

        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .chat-item { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover, .chat-item.active { background: var(--card); color: white; }

        .sidebar-footer { border-top: 1px solid var(--border); padding-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .buy-pro { background: linear-gradient(45deg, #4f46e5, #9333ea); border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; animation: glow 3s infinite; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .settings-btn { cursor: pointer; font-size: 20px; opacity: 0.7; transition: 0.3s; }
        .settings-btn:hover { opacity: 1; transform: rotate(45deg); }

        #chat-window { flex: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }
        .msg { max-width: 85%; line-height: 1.6; animation: fadeIn 0.4s ease forwards; }
        .user { align-self: flex-end; color: white; font-weight: 500; border-right: 3px solid var(--accent); padding-right: 15px; }
        .ai { align-self: flex-start; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }

        /* INPUT */
        .input-area { padding: 20px 15% 40px; background: linear-gradient(transparent, var(--bg) 40%); }
        .input-box { background: #18181b; border: 1px solid var(--border); border-radius: 15px; display: flex; padding: 12px 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input#userInput { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        #sendBtn { color: var(--accent); cursor: pointer; font-weight: bold; }

        /* SETTINGS MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--sidebar); padding: 30px; border-radius: 20px; border: 1px solid var(--border); width: 400px; }
        .modal-content h3 { margin-bottom: 20px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-modal { background: var(--accent); border: none; padding: 8px 15px; border-radius: 5px; color: white; cursor: pointer; margin-top: 10px; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(147, 51, 234, 0.3); } 50% { box-shadow: 0 0 20px rgba(147, 51, 234, 0.6); } }
        
        pre { background: #000; padding: 15px; border-radius: 10px; overflow-x: auto; margin: 10px 0; border: 1px solid #333; position: relative; }
        .copy { position: absolute; top: 5px; right: 5px; font-size: 10px; background: #333; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="new-chat" onclick="createNewChat()">+ Chat Nou</button>
        <div class="search-container">
            <input type="text" id="search" placeholder="Caută în conversatii..." oninput="filterChats()">
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <button class="buy-pro">💎 Buy Diggolo Pro</button>
            <p style="font-size: 11px; color: var(--muted); text-align: center;">Versiune: Standard 2.0</p>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2>Diggolo-AI</h2>
            <div class="settings-btn" onclick="toggleModal()">⚙️</div>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Întreabă orice...">
                <div id="sendBtn">TRIMITE</div>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>Setări Profil</h3>
            <div class="setting-row">
                <span>Nume Utilizator:</span>
                <input type="text" id="userName" style="background: #111; border: 1px solid #333; color: white; padding: 5px; border-radius: 4px;" placeholder="Gruia">
            </div>
            <div class="setting-row">
                <span>Temă Dark:</span>
                <input type="checkbox" checked disabled>
            </div>
            <button class="close-modal" onclick="saveSettings()">Salvează și Închide</button>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let chats = JSON.parse(localStorage.getItem('diggolo_chats')) || [];
    let currentChatId = null;

    // Inițializare
    function init() {
        const savedName = localStorage.getItem('user_name') || "Utilizator";
        document.getElementById('userName').value = savedName;
        renderChatList();
        if(chats.length > 0) loadChat(chats[0].id);
        else createNewChat();
    }

    function createNewChat() {
        const id = Date.now();
        const newChat = { id, title: "Chat Nou", messages: [{ role: "system", content: "Ești Diggolo AI. Autor: Gruia. Reține contextul și explică ce faci." }] };
        chats.unshift(newChat);
        saveAndRender();
        loadChat(id);
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = chats.find(c => c.id === id);
        const window = document.getElementById('chat-window');
        window.innerHTML = '';
        
        chat.messages.forEach(m => {
            if(m.role !== 'system') addMessageToUI(m.content, m.role === 'user' ? 'user' : 'ai');
        });
        renderChatList();
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMessageToUI(text, 'user');
        input.value = '';
        const loading = addMessageToUI("Se Incarca Mesaj-ul...", 'ai');

        const chat = chats.find(c => c.id === currentChatId);
        chat.messages.push({ role: "user", content: text });
        if(chat.title === "Chat Nou") chat.title = text.substring(0, 20);

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chat.messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            chat.messages.push({ role: "assistant", content: reply });
            formatAIResponse(loading, reply);
            saveAndRender();
        } catch (e) { loading.innerText = "Eroare API."; }
    }

    function addMessageToUI(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const window = document.getElementById('chat-window');
        window.appendChild(div);
        window.scrollTop = window.scrollHeight;
        return div;
    }

    function formatAIResponse(el, text) {
        if(text.includes("```")) {
            el.innerHTML = text.split("```").map((p, i) => i % 2 === 1 ? `<pre><code>${p.trim()}</code><button class="copy" onclick="navigator.clipboard.writeText(this.previousElementSibling.innerText)">Copy</button></pre>` : p).join("");
        } else { el.innerText = text; }
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        chats.forEach(c => {
            const item = document.createElement('div');
            item.className = `chat-item ${c.id === currentChatId ? 'active' : ''}`;
            item.innerText = c.title;
            item.onclick = () => loadChat(c.id);
            list.appendChild(item);
        });
    }

    function filterChats() {
        const term = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.chat-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    function saveAndRender() {
        localStorage.setItem('diggolo_chats', JSON.stringify(chats));
        renderChatList();
    }

    function toggleModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function saveSettings() {
        localStorage.setItem('user_name', document.getElementById('userName').value);
        document.getElementById('settingsModal').style.display = 'none';
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('userInput').onkeydown = (e) => e.key === 'Enter' && sendMessage();
    init();
</script>
</body>
</html>
