<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggolo-AI Standard</title>
    <style>
        :root {
            --bg: #09090b;
            --sidebar: #111113;
            --accent: #3b82f6;
            --card: #1c1c1f;
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --border: #27272a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; z-index: 10; }
        .new-chat { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 15px; transition: 0.2s; }
        
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); transition: 0.2s; position: relative; }
        .chat-item:hover, .chat-item.active { background: var(--card); color: white; }

        /* CONTEXT MENU */
        #contextMenu {
            display: none; position: fixed; background: #212123; border: 1px solid var(--border);
            border-radius: 8px; z-index: 1000; width: 180px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .menu-item { padding: 10px 15px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .menu-item:hover { background: var(--accent); color: white; }
        .menu-item.delete { color: #ff4d4d; }
        .menu-item.delete:hover { background: #ff4d4d; color: white; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 15px; line-height: 1.6; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .input-area { padding: 20px 15% 40px; }
        .input-box { background: #18181b; border: 1px solid var(--border); border-radius: 15px; display: flex; padding: 10px 15px; }
        input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 10px; }
        #sendBtn { color: var(--accent); cursor: pointer; font-weight: bold; padding: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* PRINT / PDF STYLES */
        @media print {
            .sidebar, .input-area, .header, #contextMenu { display: none !important; }
            body { background: white; color: black; }
            #chat-window { padding: 0; display: block; }
            .msg { border: 1px solid #ccc; margin-bottom: 10px; color: black !important; background: transparent !important; }
        }
    </style>
</head>
<body>

    <div id="contextMenu">
        <div class="menu-item" onclick="downloadPDF()">📄 Distribuie (PDF)</div>
        <div class="menu-item delete" onclick="deleteCurrentChat()">🗑️ Șterge Conversația</div>
    </div>

    <div class="sidebar">
        <button class="new-chat" onclick="createNewChat()">+ Chat Nou</button>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main">
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Scrie un mesaj...">
                <div id="sendBtn">TRIMITE</div>
            </div>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let chats = JSON.parse(localStorage.getItem('diggolo_v4')) || [];
    let currentChatId = null;
    let menuTargetId = null;

    function init() {
        renderChatList();
        if(chats.length > 0) loadChat(chats[0].id);
        else createNewChat();
    }

    function createNewChat() {
        const id = Date.now();
        chats.unshift({ id, title: "Chat Nou", messages: [{ role: "system", content: "Ești Diggolo AI. Autor: Gruia (gruiaa69)." }] });
        save();
        loadChat(id);
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = chats.find(c => c.id === id);
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        chat.messages.forEach(m => { if(m.role !== 'system') addMsgUI(m.content, m.role); });
        renderChatList();
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsgUI(text, 'user');
        input.value = '';
        const loading = addMsgUI("Se Incarca Mesaj-ul...", 'ai');

        const chat = chats.find(c => c.id === currentChatId);
        chat.messages.push({ role: "user", content: text });
        if(chat.title === "Chat Nou") chat.title = text.substring(0, 25);

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chat.messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            chat.messages.push({ role: "assistant", content: reply });
            loading.innerText = reply;
            save();
        } catch (e) { loading.innerText = "Eroare API."; }
    }

    function addMsgUI(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
        div.innerText = text;
        document.getElementById('chat-window').appendChild(div);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        return div;
    }

    function renderChatList() {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        chats.forEach(c => {
            const item = document.createElement('div');
            item.className = `chat-item ${c.id === currentChatId ? 'active' : ''}`;
            item.innerText = c.title;
            item.oncontextmenu = (e) => showMenu(e, c.id);
            item.onclick = () => loadChat(c.id);
            list.appendChild(item);
        });
    }

    // CONTEXT MENU LOGIC
    function showMenu(e, id) {
        e.preventDefault();
        menuTargetId = id;
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block';
        menu.style.left = `${e.pageX}px`;
        menu.style.top = `${e.pageY}px`;
    }

    window.onclick = () => document.getElementById('contextMenu').style.display = 'none';

    function deleteCurrentChat() {
        chats = chats.filter(c => c.id !== menuTargetId);
        save();
        if(chats.length > 0) loadChat(chats[0].id);
        else createNewChat();
    }

    function downloadPDF() {
        // Redirijează către funcția de print a browserului care permite Save as PDF
        window.print();
    }

    function save() { localStorage.setItem('diggolo_v4', JSON.stringify(chats)); renderChatList(); }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('userInput').onkeydown = (e) => e.key === 'Enter' && sendMessage();

    init();
</script>
</body>
</html>
