<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI 5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --sidebar: #000000;
            --accent: #10a37f;
            --text: #ececec;
            --border: rgba(255,255,255,0.1);
            --user-bubble: #2f2f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; transition: 0.3s; }
        .new-chat { border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; margin-bottom: 20px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .new-chat:hover { background: #1a1a1a; }

        /* Main Area */
        main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; height: 100%; }
        #chat-window { flex: 1; overflow-y: auto; padding-top: 20px; padding-bottom: 150px; scroll-behavior: smooth; }

        /* Rows & Bubbles */
        .row { width: 100%; display: flex; padding: 24px 18%; animation: fadeIn 0.3s ease; }
        .user-row { justify-content: flex-end; }
        .ai-row { background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

        .bubble { max-width: 85%; line-height: 1.7; font-size: 16px; word-wrap: break-word; }
        .user-bubble { background: var(--user-bubble); padding: 10px 20px; border-radius: 20px; color: #fff; }
        .ai-bubble { width: 100%; position: relative; padding-left: 40px; }
        
        /* Icon AI */
        .ai-bubble::before {
            content: "D"; position: absolute; left: 0; top: 2px; width: 28px; height: 28px;
            background: var(--accent); border-radius: 4px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 14px; color: white;
        }

        /* Code Blocks */
        .code-container { background: #000; border-radius: 8px; margin: 15px 0; border: 1px solid var(--border); overflow: hidden; }
        .code-header { background: #2d2d2d; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #aaa; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 11px; }
        .code-content { padding: 15px; font-family: 'Fira Code', monospace; overflow-x: auto; font-size: 14px; color: #e0e0e0; white-space: pre; }

        /* Input Area */
        .input-area { position: absolute; bottom: 0; width: 100%; padding: 20px 18% 40px; background: linear-gradient(transparent, var(--bg) 40%); }
        .input-wrapper { background: #212121; border: 1px solid var(--border); border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; max-height: 200px; padding: 5px; line-height: 1.5; }
        .send-btn { background: var(--accent); border: none; color: white; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; opacity: 0.4; }
        .send-btn.active { opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .row { padding: 20px 5%; }
            .input-area { padding: 10px 10px 30px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="new-chat" onclick="location.reload()"><span>+</span> New Chat</div>
    <div style="margin-top:auto; font-size:11px; color:gray; text-align:center; padding: 10px; border-top: 1px solid var(--border);">
        Diggolo AI 5.0 | Gruia-Alex
    </div>
</aside>

<main>
    <div id="chat-window">
        <div class="row ai-row">
            <div class="bubble ai-bubble">Salutare! Sunt <b>Diggolo AI 5.0</b>. Sunt online și pregătit să te ajut. Ce dorești să discutăm?</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="Mesaj către Diggolo AI..." rows="1"></textarea>
            <button id="sendBtn" class="send-btn" onclick="askAI()">↑</button>
        </div>
    </div>
</main>

<script>
    // Groq API Config
    const API_KEY = "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"; 
    let chatHistory = [{ role: "system", content: "Ești Diggolo AI 5.0, un asistent creat de Gruia-Alex. Ești extrem de inteligent, politicos și oferi răspunsuri precise." }];

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        sendBtn.classList.toggle('active', this.value.trim() !== '');
    });

    async function askAI() {
        const text = userInput.value.trim();
        if(!text) return;

        userInput.value = '';
        userInput.style.height = 'auto';
        sendBtn.classList.remove('active');

        addMsg(text, 'user');
        const aiBubble = addMsg("", 'ai');
        aiBubble.innerHTML = '<span style="color: gray;">● ● ●</span>';

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [...chatHistory, { role: "user", content: text }],
                    temperature: 0.7,
                    max_tokens: 2048
                })
            });

            const data = await response.json();
            const fullText = data.choices[0].message.content;
            
            aiBubble.innerHTML = "";
            await typeWriter(aiBubble, fullText);
            
            chatHistory.push({ role: "user", content: text });
            chatHistory.push({ role: "assistant", content: fullText });

        } catch (e) {
            aiBubble.innerText = "Eroare: Nu am putut accesa Groq. Verifică cheia API.";
            console.error(e);
        }
    }

    function addMsg(txt, type) {
        const row = document.createElement('div');
        row.className = `row ${type}-row`;
        const bubble = document.createElement('div');
        bubble.className = `bubble ${type}-bubble`;
        bubble.innerText = txt;
        row.appendChild(bubble);
        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return bubble;
    }

    async function typeWriter(element, text) {
        const parts = text.split(/```/);
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) { // Cod detectat
                const codeWithLang = parts[i].trim();
                const firstLineBreak = codeWithLang.indexOf('\n');
                const lang = firstLineBreak !== -1 ? codeWithLang.substring(0, firstLineBreak) : "code";
                const content = firstLineBreak !== -1 ? codeWithLang.substring(firstLineBreak + 1) : codeWithLang;

                const container = document.createElement('div');
                container.className = 'code-container';
                container.innerHTML = `
                    <div class="code-header">
                        <span>${lang}</span>
                        <button class="copy-btn" onclick="copyCode(this)">Copy code</button>
                    </div>
                    <div class="code-content">${content}</div>
                `;
                element.appendChild(container);
            } else { // Text normal
                const words = parts[i].split(" ");
                const span = document.createElement('span');
                element.appendChild(span);
                for (let word of words) {
                    if (word === "") continue;
                    span.innerText += word + " ";
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    await new Promise(r => setTimeout(r, 45)); // Viteza ChatGPT
                }
            }
        }
    }

    function copyCode(btn) {
        const code = btn.parentElement.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy code", 2000);
    }

    userInput.addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            askAI();
        }
    });
</script>
</body>
</html>
