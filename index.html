<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>AI-Diggolo Pro | Groq Engine</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; height: 550px; background: #161b22; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid #30363d; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #30363d; color: #58a6ff; font-weight: bold; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; font-size: 14px; max-width: 85%; }
        .user { background: #238636; align-self: flex-end; color: white; }
        .ai { background: #30363d; align-self: flex-start; }
        .input-area { display: flex; padding: 10px; border-top: 1px solid #30363d; }
        input { flex: 1; padding: 10px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px; outline: none; }
        button { margin-left: 8px; padding: 10px; background: #58a6ff; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-container">
    <header>AI-DIGGOLO PRO</header>
    <div id="chat-box"><div class="msg ai">Salut, Gruia! Sunt pe motorul Groq acum. Merg instant!</div></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Scrie un mesaj...">
        <button id="sendBtn">Trimite</button>
    </div>
</div>

<script>
    const box = document.getElementById('chat-box');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    // PUNE AICI CHEIA TA DE LA GROQ (gsk_...)
    const GROQ_KEY = "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";

    async function askAI() {
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";
        const loading = addMsg("AI-Diggolo scrie...", 'ai');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{role: "user", content: "Raspunde in romana scurt: " + text}]
                })
            });

            const data = await response.json();
            loading.innerText = data.choices[0].message.content;
        } catch (e) {
            loading.innerText = "Eroare! Verifica daca ai pus cheia Groq corect.";
        }
    }

    function addMsg(t, c) {
        const d = document.createElement('div');
        d.className = 'msg ' + c;
        d.innerText = t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    btn.onclick = askAI;
    input.onkeydown = (e) => { if(e.key === 'Enter') askAI(); };
</script>
</body>
</html>
