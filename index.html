<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggolo AI | Pro Vision V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #4f46e5;
            --panel: #111113;
            --text: #ffffff;
            --border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar Pro */
        .sidebar { width: 280px; background: #000; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; }

        /* Chat window */
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 18%; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }

        .msg { max-width: 85%; animation: fadeIn 0.4s ease forwards; line-height: 1.6; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { align-self: flex-end; background: #1e1e20; padding: 14px 22px; border-radius: 22px 22px 4px 22px; border: 1px solid var(--border); }
        .ai-msg { align-self: flex-start; width: 100%; border-left: 3px solid var(--accent); padding-left: 20px; }

        /* Thinking & Image Stats */
        .thinking-step { font-size: 13px; color: #6b7280; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .pulse { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        .ai-image-container { position: relative; margin-top: 15px; border-radius: 16px; overflow: hidden; background: #1a1a1a; min-height: 300px; border: 1px solid var(--border); }
        .ai-img { width: 100%; display: block; transition: 0.3s; }
        .download-btn { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; backdrop-filter: blur(5px); font-size: 12px; }

        /* Input Area */
        .input-area { padding: 20px 18% 40px; }
        .input-box { background: var(--panel); border: 1px solid var(--border); border-radius: 28px; padding: 12px 24px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; max-height: 150px; }
        .send-btn { background: #fff; color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 800; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.1); }

        @media (max-width: 900px) { #chat-window { padding: 20px 5%; } .input-area { padding: 10px 5% 20px; } .sidebar { display: none; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">DIGGOLO V5</div>
    <div style="color: #444; font-size: 12px; margin-bottom: 20px;">POWERED BY FLUX PRO</div>
    <button style="background: #1e1e20; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 12px; cursor: pointer;" onclick="location.reload()">+ Sesiune Nouă</button>
</aside>

<main style="flex:1; display:flex; flex-direction:column; position: relative;">
    <div id="chat-window"></div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="userInput" placeholder="Descrie o imagine sau întreabă ceva..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <div class="send-btn" onclick="handleInput()">↑</div>
        </div>
    </div>
</main>

<script>
    const GROQ_KEY = "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";
    let history = [];

    async function handleInput() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = '';
        input.style.height = 'auto';

        const aiDiv = createAIBlock();
        const steps = aiDiv.querySelector('.thinking-process');
        const response = aiDiv.querySelector('.response-text');

        // Logică Generare (Dacă ceri imagine)
        if(text.toLowerCase().includes("generează") || text.toLowerCase().includes("fă-mi") || text.toLowerCase().includes("imagine")) {
            steps.innerHTML = `<div class="thinking-step"><div class="pulse"></div> Analizez cererea prompt-ului artistic...</div>`;
            
            setTimeout(() => {
                steps.innerHTML += `<div class="thinking-step"><div class="pulse"></div> Apelează modelul FLUX-1 pentru randare...</div>`;
                
                setTimeout(() => {
                    const seed = Math.floor(Math.random() * 1000000);
                    // Folosim FLUX-1 prin Pollinations, care oferă calitate de nivel Google/Midjourney
                    const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
                    
                    steps.innerHTML = `<div class="thinking-step">✅ Imagine procesată cu succes la rezoluție 1024x1024.</div>`;
                    response.innerHTML = `
                        Iată viziunea mea pentru cererea ta:
                        <div class="ai-image-container">
                            <img src="${imgUrl}" class="ai-img" onload="this.parentElement.style.minHeight='auto'">
                            <button class="download-btn" onclick="window.open('${imgUrl}')">Download HD</button>
                        </div>
                    `;
                }, 1500);
            }, 1000);
            return;
        }

        // Logică Text Normal
        steps.innerHTML = `<div class="thinking-step"><div class="pulse"></div> Generez răspuns...</div>`;
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [...history, {role: "user", content: text}]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            steps.style.display = 'none';
            response.innerHTML = reply.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            history.push({role: "user", content: text}, {role: "assistant", content: reply});
        } catch(e) {
            steps.innerHTML = "❌ Eroare de server.";
        }
    }

    function createAIBlock() {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "msg ai-msg";
        div.innerHTML = `<div class="thinking-process"></div><div class="response-text"></div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function addMsg(t, r) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${r}-msg`;
        div.innerText = t;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    // Enter pentru trimitere
    document.getElementById('userInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleInput(); }
    });
</script>
</body>
</html>
