<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo AI | Standard Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --sidebar: #000000;
            --accent: #10a37f;
            --text: #ececec;
            --border: rgba(255,255,255,0.1);
            --user-bubble: #2f2f2f;
            --code-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .new-chat { border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; transition: 0.2s; }
        .new-chat:hover { background: #1a1a1a; }

        /* Main Area */
        main { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; }
        #chat-window { flex: 1; overflow-y: auto; padding-top: 20px; padding-bottom: 200px; scroll-behavior: smooth; }

        /* Rows & Bubbles */
        .row { width: 100%; display: flex; padding: 24px 18%; animation: fadeIn 0.3s ease; }
        .user-row { justify-content: flex-end; }
        .ai-row { background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

        .bubble { max-width: 85%; line-height: 1.7; font-size: 16px; word-wrap: break-word; white-space: pre-wrap; }
        .user-bubble { background: var(--user-bubble); padding: 12px 20px; border-radius: 20px; }
        .ai-bubble { width: 100%; position: relative; padding-left: 45px; }
        
        .ai-icon {
            position: absolute; left: 0; top: 2px; width: 32px; height: 32px;
            background: var(--accent); border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 14px; color: white;
        }

        /* --- SISTEM DETECTIE COD --- */
        .code-block { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; margin: 15px 0; overflow: hidden; }
        .code-header { background: #2d2d2d; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #aaa; font-family: sans-serif; }
        .copy-btn { background: transparent; border: 1px solid #444; color: #ddd; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .copy-btn:hover { background: #444; color: white; }
        .code-content { padding: 15px; font-family: 'Fira Code', monospace; overflow-x: auto; font-size: 14px; color: #e0e0e0; white-space: pre; background: #000; }

        /* Input Area */
        .bottom-container { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, var(--bg) 40%); padding-bottom: 20px; }
        .input-area { padding: 0 18% 10px; }
        .input-wrapper { background: #212121; border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; max-height: 200px; line-height: 1.5; }
        .send-btn { background: var(--accent); border: none; color: white; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .premium-banner { text-align: center; font-size: 12px; color: var(--accent); font-weight: 500; opacity: 0.8; padding: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .row { padding: 20px 5%; }
            .input-area { padding: 0 10px 10px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="new-chat" onclick="location.reload()">+ New Chat</div>
    <div style="margin-top:auto; font-size:11px; color:gray; text-align:center; padding: 10px;">Diggolo-Standard v5.0</div>
</aside>

<main>
    <div id="chat-window">
        <div class="row ai-row">
            <div class="bubble ai-bubble">
                <div class="ai-icon">D</div>
                Salut! Sunt <b>Diggolo AI 5.0 (Standard)</b>. Cum te pot ajuta astăzi?
            </div>
        </div>
    </div>

    <div class="bottom-container">
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Scrie un mesaj..." rows="1"></textarea>
                <button class="send-btn" onclick="askAI()">↑</button>
            </div>
        </div>
        <div class="premium-banner">
            ✨ În curând: Poți achiziționa varianta Premium (Scoasă din Beta)
        </div>
    </div>
</main>

<script>
    const API_KEY = "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"; 
    let chatHistory = [{ role: "system", content: "Ești Diggolo AI 5.0 Standard. Răspunde clar, păstrând spațiile între cuvinte. Când scrii cod, folosește formatul cu trei backticks (```)." }];

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');

    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    async function askAI() {
        const text = userInput.value.trim();
        if(!text) return;

        userInput.value = '';
        userInput.style.height = 'auto';

        addMsg(text, 'user');
        const aiBubble = addMsg("", 'ai');
        aiBubble.innerHTML = '<div class="ai-icon">D</div><span style="color:gray">Diggolo scrie...</span>';

        try {
            const response = await fetch("[https://api.groq.com/openai/v1/chat/completions](https://api.groq.com/openai/v1/chat/completions)", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [...chatHistory, { role: "user", content: text }]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            aiBubble.innerHTML = '<div class="ai-icon">D</div>';
            await typeEffect(aiBubble, reply);
            
            chatHistory.push({ role: "user", content: text }, { role: "assistant", content: reply });
        } catch (e) {
            aiBubble.innerHTML += " Eroare de conexiune.";
        }
    }

    function addMsg(txt, type) {
        const row = document.createElement('div');
        row.className = `row ${type}-row`;
        const bubble = document.createElement('div');
        bubble.className = `bubble ${type}-bubble`;
        if(type === 'ai') bubble.innerHTML = '<div class="ai-icon">D</div>';
        bubble.append(txt);
        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return bubble;
    }

    async function typeEffect(element, text) {
        // Detectăm blocurile de cod prin delimitatorul ```
        const segments = text.split(/```/);
        
        for (let i = 0; i < segments.length; i++) {
            if (i % 2 === 1) { // Segment de COD
                const codeLines = segments[i].split('\n');
                const lang = codeLines[0].trim() || "code";
                const actualCode = codeLines.slice(1).join('\n').trim();

                const codeWrapper = document.createElement('div');
                codeWrapper.className = 'code-block';
                codeWrapper.innerHTML = `
                    <div class="code-header">
                        <span>${lang}</span>
                        <button class="copy-btn" onclick="copyText(this)">Copy code</button>
                    </div>
                    <div class="code-content">${actualCode}</div>
                `;
                element.appendChild(codeWrapper);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } else { // Segment de TEXT NORMAL
                const chars = Array.from(segments[i]);
                for (let char of chars) {
                    const node = document.createTextNode(char);
                    element.appendChild(node);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    await new Promise(r => setTimeout(r, 20)); // Viteză fluidă
                }
            }
        }
    }

    function copyText(btn) {
        const code = btn.parentElement.nextElementSibling.innerText;
        navigator.clipboard.writeText(code).then(() => {
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = "Copy code"; }, 2000);
        });
    }

    userInput.addEventListener('keydown', e => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
    });
</script>
</body>
</html>
