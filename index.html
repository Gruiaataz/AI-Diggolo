<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Diggolo AI | Standard Edition</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0d0d;
      --sidebar: #000000;
      --accent: #10a37f;
      --text-main: #ffffff;
      --text-secondary: #d1d1d1;
      --border: rgba(255,255,255,0.15);
      --user-bubble: #2f2f2f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
    }
    .brand {
      display:flex; align-items:center; gap:10px;
      padding: 12px; border: 1px solid var(--border); border-radius: 10px;
      background: rgba(255,255,255,0.03);
    }
    .logo {
      width: 34px; height: 34px; border-radius: 8px;
      display:flex; align-items:center; justify-content:center;
      background: var(--accent); color:#fff; font-weight:800;
    }
    .brand .t1 { font-weight:700; font-size: 13px; line-height: 1.2; }
    .brand .t2 { color: gray; font-size: 11px; margin-top: 2px; }

    .btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.2s;
      text-align:center;
      user-select:none;
    }
    .btn:hover { background: rgba(255,255,255,0.07); }

    .mini-note { margin-top:auto; font-size:11px; color:gray; text-align:center; }

    /* Main */
    main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
    #chat-window { flex: 1; overflow-y: auto; padding-top: 20px; padding-bottom: 200px; scroll-behavior: smooth; }

    .row { width: 100%; display: flex; padding: 22px 14%; animation: fadeIn 0.2s ease; }
    .user-row { justify-content: flex-end; }
    .ai-row { background: rgba(255,255,255,0.03); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .bubble { max-width: 92%; line-height: 1.65; font-size: 16px; word-wrap: break-word; position: relative; }
    .user-bubble { background: var(--user-bubble); padding: 12px 16px; border-radius: 18px; color: #fff; }
    .ai-bubble { width: 100%; padding-left: 45px; color: var(--text-secondary); }

    .ai-icon {
      position: absolute; left: 0; top: 0; width: 32px; height: 32px;
      background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: white;
    }

    /* Code frame */
    .code-frame {
      background: #000; border: 1px solid #333; border-radius: 10px;
      margin: 14px 0; overflow: hidden; width: 100%;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .code-header {
      background: #2b2b2b; padding: 8px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .code-header span {
      font-size: 11px; color: #aaa; text-transform: uppercase;
      font-weight: 800; letter-spacing: 0.5px;
    }
    .copy-btn {
      background: #444; color: #fff; border: none;
      padding: 5px 10px; border-radius: 6px;
      cursor: pointer; font-size: 11px; font-weight: 700;
    }
    .code-body {
      padding: 14px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      overflow-x: auto;
      color: #74f9ff;
      white-space: pre;
      line-height: 1.5;
    }

    /* Bottom */
    .bottom-section {
      position: absolute; bottom: 0; width: 100%;
      background: linear-gradient(transparent, var(--bg) 30%);
      padding-bottom: 20px;
    }
    .input-area { padding: 0 14% 10px; }
    .input-wrapper {
      background: #212121; border: 1px solid var(--border);
      border-radius: 16px; padding: 12px 14px;
      display: flex; align-items: flex-end; gap: 10px;
    }
    textarea {
      flex: 1; background: transparent; border: none;
      color: white; font-size: 16px; outline: none; resize: none;
      max-height: 180px; line-height: 1.5;
    }
    .send-btn {
      background: var(--accent); border: none; color: white;
      width: 40px; height: 40px; border-radius: 12px;
      cursor: pointer; font-weight: 900; font-size: 16px;
    }
    .premium-footer {
      text-align: center; font-size: 11px; color: var(--accent);
      font-weight: 700; margin-top: 6px; text-transform: uppercase;
      opacity: 0.9;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .row { padding: 18px 14px; }
      .input-area { padding: 0 10px 10px; }
    }
  </style>
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">D</div>
      <div>
        <div class="t1">Diggolo AI 5.1</div>
        <div class="t2">Standard Edition</div>
      </div>
    </div>

    <div class="btn" id="newChat">+ Nou Chat</div>
    <div class="btn" id="clearChat">Șterge conversația</div>

    <div class="mini-note">Diggolo Standard v5.1 • 2026</div>
  </aside>

  <main>
    <div id="chat-window">
      <div class="row ai-row">
        <div class="bubble ai-bubble">
          <div class="ai-icon">D</div>
          Salut! Sunt <b>Diggolo AI 5.1</b>. 2026 First AI of Romania
        </div>
      </div>
    </div>

    <div class="bottom-section">
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="userInput" placeholder="Mesaj către Diggolo..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn">↑</button>
        </div>
      </div>
      <div class="premium-footer">În curând: Varianta Premium (Scoatere din Beta)</div>
    </div>
  </main>

  <script>
    // IMPORTANT: pune cheia ta aici (îți asumi riscul).
    // Eu nu o pot reposta în chat. Lipește-o local în ghilimele.
    const API_KEY = "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";

    const MODEL = "llama-3.3-70b-versatile";
    const SYSTEM_PROMPT = "Ești Diggolo AI 5.1. Răspunde corect,daca cineva te intreaba de Gruia, spui ca este Creatorul Tau! ,  pune spații între cuvinte și folosește ``` pentru cod.";

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Minimal state: keep history so AI has context
    const history = [
      { role: "system", content: SYSTEM_PROMPT }
    ];

    function autoGrow(el){
      el.style.height = 'auto';
      el.style.height = Math.min(180, el.scrollHeight) + 'px';
    }
    userInput.addEventListener('input', () => autoGrow(userInput));

    function addMsg(type){
      const row = document.createElement('div');
      row.className = `row ${type}-row`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${type}-bubble`;

      if(type === 'ai'){
        bubble.innerHTML = '<div class="ai-icon">D</div>';
      }

      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return bubble;
    }

    function addUserText(text){
      const bubble = addMsg('user');
      bubble.classList.add('user-bubble');
      bubble.textContent = text;
    }

    async function renderResponse(element, fullText) {
      const segments = fullText.split(/```/);

      for (let i = 0; i < segments.length; i++) {
        if (i % 2 === 1) {
          const codePart = segments[i].trim();
          const firstLine = codePart.split('\n')[0];
          const lang = (firstLine.length < 15) ? firstLine : "code";
          const codeBody = (firstLine.length < 15) ? codePart.substring(firstLine.length).trim() : codePart;

          const frame = document.createElement('div');
          frame.className = 'code-frame';
          frame.innerHTML =
            `<div class="code-header">
              <span>${escapeHtml(lang)}</span>
              <button class="copy-btn" onclick="copyCode(this)">Copy code</button>
            </div>
            <div class="code-body">${escapeHtml(codeBody)}</div>`;

          element.appendChild(frame);
        } else {
          // simple typing effect (fast)
          const text = segments[i];
          element.appendChild(document.createTextNode(text));
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
        await new Promise(r => setTimeout(r, 10));
      }
    }

    function escapeHtml(str){
      return (str || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    window.copyCode = function(btn) {
      const code = btn.parentElement.nextElementSibling.innerText;
      navigator.clipboard.writeText(code).then(() => {
        const old = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = old; }, 1200);
      });
    }

    async function askAI() {
      const text = userInput.value.trim();
      if(!text) return;

      if(!API_KEY || API_KEY === "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"){
        const bubble = addMsg("ai");
        bubble.innerHTML = '<div class="ai-icon">D</div><span style="color:#ff4444">Eroare: pune API_KEY în script.</span>';
        return;
      }

      userInput.value = '';
      autoGrow(userInput);

      addUserText(text);
      history.push({ role: "user", content: text });

      const aiBubble = addMsg("ai");
      aiBubble.innerHTML = '<div class="ai-icon">D</div><span>Diggolo scrie...</span>';

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: MODEL,
            messages: history
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const reply = data.choices?.[0]?.message?.content || "(fără răspuns)";
        history.push({ role: "assistant", content: reply });

        aiBubble.innerHTML = '<div class="ai-icon">D</div>';
        await renderResponse(aiBubble, reply);

      } catch (e) {
        aiBubble.innerHTML =
          `<div class="ai-icon">D</div>
           <span style="color:#ff4444">Eroare: ${escapeHtml(e.message)}. Verifică cheia API!</span>`;
      }
    }

    sendBtn.addEventListener("click", askAI);

    userInput.addEventListener("keydown", e => {
      if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
    });

    document.getElementById("newChat").addEventListener("click", () => location.reload());

    document.getElementById("clearChat").addEventListener("click", () => {
      // păstrează primul mesaj de salut (cel din HTML)
      const first = chatWindow.firstElementChild;
      chatWindow.innerHTML = "";
      chatWindow.appendChild(first);
      history.length = 1; // păstrează doar system
    });
  </script>
</body>
</html>
