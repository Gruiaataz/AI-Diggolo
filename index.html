<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Diggolo AI | Standard Edition</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0d0d;
      --sidebar: #000000;
      --accent: #10a37f;
      --text-main: #ffffff;
      --text-secondary: #d1d1d1;
      --border: rgba(255,255,255,0.15);
      --user-bubble: #2f2f2f;
      --panel: rgba(255,255,255,0.03);
      --danger: #ff4444;
      --warn: #ffcc66;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
    }
    .brand {
      display:flex; align-items:center; gap:10px;
      padding: 12px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--panel);
    }
    .logo {
      width: 34px; height: 34px; border-radius: 8px;
      display:flex; align-items:center; justify-content:center;
      background: var(--accent); color:#fff; font-weight:800;
      user-select: none;
    }
    .brand .t1 { font-weight:700; font-size: 13px; line-height: 1.2; }
    .brand .t2 { color: gray; font-size: 11px; margin-top: 2px; }

    .btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.2s;
      text-align:center;
      user-select:none;
    }
    .btn:hover { background: rgba(255,255,255,0.07); }

    .btn-row { display:flex; gap:10px; }
    .btn.small { padding: 10px; font-size: 12px; flex: 1; }

    .card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 10px;
      padding: 12px;
    }
    .card-title {
      display:flex; align-items:center; justify-content:space-between;
      font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.65);
      margin-bottom: 10px;
      font-weight: 800;
    }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom: 10px; }
    .label { font-size: 11px; color: rgba(255,255,255,.65); display:flex; justify-content:space-between; }
    .input, select {
      width: 100%;
      padding: 10px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.30);
      color: #fff;
      outline: none;
      font-size: 13px;
    }
    .input:focus, select:focus { border-color: rgba(16,163,127,.55); }

    .mini-note { margin-top:auto; font-size:11px; color:gray; text-align:center; }

    /* Main */
    main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
    #chat-window { flex: 1; overflow-y: auto; padding-top: 20px; padding-bottom: 220px; scroll-behavior: smooth; }

    .row { width: 100%; display: flex; padding: 22px 14%; animation: fadeIn 0.2s ease; }
    .user-row { justify-content: flex-end; }
    .ai-row { background: rgba(255,255,255,0.03); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .bubble { max-width: 92%; line-height: 1.65; font-size: 16px; word-wrap: break-word; position: relative; }
    .user-bubble { background: var(--user-bubble); padding: 12px 16px; border-radius: 18px; color: #fff; }
    .ai-bubble { width: 100%; padding-left: 45px; color: var(--text-secondary); }

    .ai-icon {
      position: absolute; left: 0; top: 0; width: 32px; height: 32px;
      background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: white;
      user-select: none;
    }

    .msg-actions {
      display:flex;
      gap: 8px;
      margin-top: 10px;
      opacity: .95;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #fff;
      padding: 7px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      user-select: none;
    }
    .chip:hover { background: rgba(255,255,255,0.08); }
    .chip.danger { border-color: rgba(255,68,68,.35); background: rgba(255,68,68,.12); }

    /* Code frame */
    .code-frame {
      background: #000; border: 1px solid #333; border-radius: 10px;
      margin: 14px 0; overflow: hidden; width: 100%;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .code-header {
      background: #2b2b2b; padding: 8px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .code-header span {
      font-size: 11px; color: #aaa; text-transform: uppercase;
      font-weight: 800; letter-spacing: 0.5px;
    }
    .copy-btn {
      background: #444; color: #fff; border: none;
      padding: 5px 10px; border-radius: 6px;
      cursor: pointer; font-size: 11px; font-weight: 700;
    }
    .code-body {
      padding: 14px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      overflow-x: auto;
      color: #74f9ff;
      white-space: pre;
      line-height: 1.5;
    }

    /* Bottom */
    .bottom-section {
      position: absolute; bottom: 0; width: 100%;
      background: linear-gradient(transparent, var(--bg) 30%);
      padding-bottom: 20px;
    }
    .input-area { padding: 0 14% 10px; }
    .input-wrapper {
      background: #212121; border: 1px solid var(--border);
      border-radius: 16px; padding: 12px 14px;
      display: flex; align-items: flex-end; gap: 10px;
    }
    textarea {
      flex: 1; background: transparent; border: none;
      color: white; font-size: 16px; outline: none; resize: none;
      max-height: 180px; line-height: 1.5;
    }
    .send-btn {
      background: var(--accent); border: none; color: white;
      width: 40px; height: 40px; border-radius: 12px;
      cursor: pointer; font-weight: 900; font-size: 16px;
    }
    .premium-footer {
      text-align: center; font-size: 11px; color: var(--accent);
      font-weight: 700; margin-top: 6px; text-transform: uppercase;
      opacity: 0.9;
    }

    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 92px;
      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      pointer-events:none;
      transition: opacity .2s ease, transform .2s ease;
      max-width: min(600px, calc(100% - 24px));
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .row { padding: 18px 14px; }
      .input-area { padding: 0 10px 10px; }
    }
  </style>
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">D</div>
      <div>
        <div class="t1">Diggolo AI 5.1</div>
        <div class="t2">Standard Edition</div>
      </div>
    </div>

    <div class="btn" id="newChat">+ Nou Chat</div>

    <div class="btn-row">
      <div class="btn small" id="exportBtn">Export</div>
      <div class="btn small" id="importBtn">Import</div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Setări</span>
        <span style="color:rgba(255,255,255,.55); font-size:11px; letter-spacing:0; text-transform:none;">simple</span>
      </div>

      <div class="field">
        <div class="label"><span>Caută în chat</span><span style="color:rgba(255,255,255,.5)">live</span></div>
        <input class="input" id="search" placeholder="ex: cod, plan, Groq..." />
      </div>

      <div class="field">
        <div class="label"><span>Model</span></div>
        <select id="model">
          <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
          <option value="llama-3.1-70b-versatile">llama-3.1-70b-versatile</option>
          <option value="llama-3.1-8b-instant">llama-3.1-8b-instant</option>
          <option value="mixtral-8x7b-32768">mixtral-8x7b-32768</option>
        </select>
      </div>

      <div class="field">
        <div class="label">
          <span>Temperatură</span>
          <span id="tempVal" style="color:rgba(255,255,255,.7); font-family:'Fira Code',monospace;">0.7</span>
        </div>
        <input class="input" id="temp" type="range" min="0" max="1" step="0.05" value="0.7" />
      </div>

      <div class="field" style="margin-bottom:0;">
        <div class="label">
          <span>Max tokens</span>
          <span style="color:rgba(255,255,255,.55)">limită răspuns</span>
        </div>
        <input class="input" id="maxTokens" type="number" min="64" max="4096" step="64" value="800" />
      </div>
    </div>

    <div class="mini-note">Diggolo Standard v5.1 • 2026</div>
  </aside>

  <main>
    <div id="chat-window"></div>

    <div class="bottom-section">
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="userInput" placeholder="Mesaj către Diggolo..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" title="Trimite">↑</button>
        </div>
      </div>
      <div class="premium-footer">
        <span id="statusLine">Gata.</span>
        • <span style="opacity:.8">Enter trimite • Shift+Enter rând nou</span>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    // Lipește cheia TA local aici:
    const API_KEY = "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";

    const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
    const SYSTEM_PROMPT = "Ești Diggolo AI 5.1. Răspunde corect. Daca cineva te intreaba de Gruia, spui ca este Creatorul Tau! Pune spații între cuvinte și folosește ``` pentru cod.";

    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusLine = document.getElementById('statusLine');

    const modelSel = document.getElementById('model');
    const tempRange = document.getElementById('temp');
    const tempVal = document.getElementById('tempVal');
    const maxTokensInput = document.getElementById('maxTokens');
    const searchInput = document.getElementById('search');

    const toastEl = document.getElementById('toast');

    let abortController = null;

    // ---------- Storage ----------
    const STORE_KEY = "diggolo_chat_v1";
    const SETTINGS_KEY = "diggolo_settings_v1";

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state.history));
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }
    function saveSettings(){
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        model: modelSel.value,
        temp: tempRange.value,
        maxTokens: maxTokensInput.value
      }));
    }
    function loadSettings(){
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    // ---------- UI helpers ----------
    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 1600);
    }

    function setStatus(text){
      statusLine.textContent = text;
    }

    function autoGrow(el){
      el.style.height = 'auto';
      el.style.height = Math.min(180, el.scrollHeight) + 'px';
    }
    userInput.addEventListener('input', () => autoGrow(userInput));

    function escapeHtml(str){
      return (str || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function addRow(type) {
      const row = document.createElement('div');
      row.className = `row ${type}-row`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${type}-bubble`;

      if (type === 'ai') bubble.innerHTML = '<div class="ai-icon">D</div>';

      row.appendChild(bubble);
      chatWindow.appendChild(row);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return bubble;
    }

    function addUserMessage(text){
      const bubble = addRow('user');
      bubble.classList.add('user-bubble');
      bubble.textContent = text;

      // actions (copy)
      const actions = document.createElement("div");
      actions.className = "msg-actions";
      const copyBtn = document.createElement("div");
      copyBtn.className = "chip";
      copyBtn.textContent = "Copy mesaj";
      copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(text);
        toast("Copiat.");
      };
      actions.appendChild(copyBtn);
      bubble.appendChild(actions);
    }

    function makeAIActionBar(replyText){
      const actions = document.createElement("div");
      actions.className = "msg-actions";

      const copyBtn = document.createElement("div");
      copyBtn.className = "chip";
      copyBtn.textContent = "Copy";
      copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(replyText);
        toast("Copiat.");
      };

      const regenBtn = document.createElement("div");
      regenBtn.className = "chip";
      regenBtn.textContent = "Regenerate";
      regenBtn.onclick = () => regenerateLast();

      const stopBtn = document.createElement("div");
      stopBtn.className = "chip danger";
      stopBtn.textContent = "Stop";
      stopBtn.onclick = () => stopGeneration();

      actions.appendChild(copyBtn);
      actions.appendChild(regenBtn);
      actions.appendChild(stopBtn);

      return actions;
    }

    async function renderResponse(element, fullText, typing=false) {
      const segments = (fullText || "").split(/```/);

      for (let i = 0; i < segments.length; i++) {
        if (i % 2 === 1) {
          const codePart = segments[i].trim();
          const firstLine = codePart.split('\n')[0];
          const lang = (firstLine.length < 15) ? firstLine : "code";
          const codeBody = (firstLine.length < 15) ? codePart.substring(firstLine.length).trim() : codePart;

          const frame = document.createElement('div');
          frame.className = 'code-frame';
          frame.innerHTML =
            `<div class="code-header">
              <span>${escapeHtml(lang)}</span>
              <button class="copy-btn" onclick="copyCode(this)">Copy code</button>
            </div>
            <div class="code-body">${escapeHtml(codeBody)}</div>`;

          element.appendChild(frame);
        } else {
          const text = segments[i];
          if(!typing){
            element.appendChild(document.createTextNode(text));
          } else {
            for (const ch of Array.from(text)) {
              element.appendChild(document.createTextNode(ch));
              chatWindow.scrollTop = chatWindow.scrollHeight;
              await new Promise(r => setTimeout(r, 8));
            }
          }
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }
    }

    window.copyCode = function(btn) {
      const code = btn.parentElement.nextElementSibling.innerText;
      navigator.clipboard.writeText(code).then(() => {
        const old = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = old; }, 1200);
      });
    }

    // ---------- State ----------
    const state = {
      history: [
        { role: "system", content: SYSTEM_PROMPT },
        { role: "assistant", content: "Salut! Sunt Diggolo AI 5.1. Spune-mi ce vrei să fac. ✅" }
      ]
    };

    function getKey(){
      return (API_KEY || "").trim();
    }

    function renderFullChat(filter=""){
      chatWindow.innerHTML = "";
      const q = (filter || "").trim().toLowerCase();

      // Ignore first system message for display, show assistant/user only
      const visible = state.history.filter(m => m.role !== "system");

      for (const msg of visible) {
        if (q && !(msg.content || "").toLowerCase().includes(q)) continue;

        if (msg.role === "user") {
          addUserMessage(msg.content);
        } else {
          const bubble = addRow("ai");
          bubble.innerHTML = '<div class="ai-icon">D</div>';
          renderResponse(bubble, msg.content, false);
          bubble.appendChild(makeAIActionBar(msg.content));
        }
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // ---------- API ----------
    async function callGroq(messages){
      const key = getKey();
      if(!key) throw new Error("Lipsește API_KEY în script.");

      abortController = new AbortController();

      const payload = {
        model: modelSel.value,
        temperature: Number(tempRange.value),
        max_tokens: Number(maxTokensInput.value),
        messages
      };

      const res = await fetch(GROQ_URL, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${key}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload),
        signal: abortController.signal
      });

      const data = await res.json().catch(() => ({}));
      if(!res.ok || data?.error){
        const msg = data?.error?.message || `HTTP ${res.status}`;
        throw new Error(msg);
      }
      return data.choices?.[0]?.message?.content ?? "";
    }

    function stopGeneration(){
      if(abortController){
        abortController.abort();
        abortController = null;
        setStatus("Oprit.");
        toast("Stop.");
      }
    }

    async function askAI(text){
      const key = getKey();
      if(!key){
        const bubble = addRow("ai");
        bubble.innerHTML = '<div class="ai-icon">D</div><span style="color:var(--danger)">Eroare: pune API_KEY în script.</span>';
        return;
      }

      setStatus("Diggolo scrie...");
      sendBtn.disabled = true;

      // Add to state + UI
      state.history.push({ role: "user", content: text });
      saveState();
      renderFullChat(searchInput.value);

      const aiBubble = addRow("ai");
      aiBubble.innerHTML = '<div class="ai-icon">D</div><span>Diggolo scrie...</span>';

      try {
        const reply = await callGroq(state.history);
        // push assistant reply
        state.history.push({ role: "assistant", content: reply });
        saveState();

        aiBubble.innerHTML = '<div class="ai-icon">D</div>';
        await renderResponse(aiBubble, reply, true);
        aiBubble.appendChild(makeAIActionBar(reply));

        setStatus("Gata.");
      } catch (e) {
        const msg = escapeHtml(e.message || "Eroare necunoscută");
        aiBubble.innerHTML = `<div class="ai-icon">D</div><span style="color:var(--danger)">Eroare: ${msg}</span>`;
        setStatus("Eroare.");
      } finally {
        abortController = null;
        sendBtn.disabled = false;
      }
    }

    // Regenerate last: remove last assistant, resend last user
    async function regenerateLast(){
      // find last user message
      let lastUser = null;
      for(let i = state.history.length - 1; i >= 0; i--){
        if(state.history[i].role === "assistant"){
          // remove last assistant only
          state.history.splice(i, 1);
          break;
        }
      }
      for(let i = state.history.length - 1; i >= 0; i--){
        if(state.history[i].role === "user"){
          lastUser = state.history[i].content;
          break;
        }
      }
      saveState();
      renderFullChat(searchInput.value);
      if(lastUser) await askAI(lastUser);
      else toast("N-am ce regenera.");
    }

    // ---------- Events ----------
    document.getElementById("newChat").addEventListener("click", () => {
      if(!confirm("Chat nou? Se șterge conversația curentă.")) return;
      state.history = [
        { role: "system", content: SYSTEM_PROMPT },
        { role: "assistant", content: "Chat nou pornit. Spune-mi ce vrei să fac. ✅" }
      ];
      saveState();
      renderFullChat(searchInput.value);
      toast("Resetat.");
    });

    sendBtn.addEventListener("click", () => {
      const text = userInput.value.trim();
      if(!text) return;
      userInput.value = "";
      autoGrow(userInput);
      askAI(text);
    });

    userInput.addEventListener("keydown", e => {
      if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
    });

    tempRange.addEventListener("input", () => {
      tempVal.textContent = Number(tempRange.value).toFixed(2);
      saveSettings();
    });
    modelSel.addEventListener("change", saveSettings);
    maxTokensInput.addEventListener("change", saveSettings);

    searchInput.addEventListener("input", () => {
      renderFullChat(searchInput.value);
    });

    // Export
    document.getElementById("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify({ history: state.history }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `diggolo_chat_${Date.now()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast("Exportat.");
    });

    // Import
    document.getElementById("importBtn").addEventListener("click", () => {
      const inp = document.createElement("input");
      inp.type = "file";
      inp.accept = "application/json";
      inp.onchange = async () => {
        const file = inp.files?.[0];
        if(!file) return;
        try{
          const text = await file.text();
          const obj = JSON.parse(text);
          if(!obj?.history || !Array.isArray(obj.history)) throw new Error("Format invalid.");
          // Ensure first is system; if not, prepend
          const hist = obj.history;
          if(!hist.length || hist[0].role !== "system"){
            hist.unshift({ role: "system", content: SYSTEM_PROMPT });
          }
          state.history = hist;
          saveState();
          renderFullChat(searchInput.value);
          toast("Import OK.");
        }catch(err){
          alert("Import eșuat: " + (err?.message || "eroare"));
        }
      };
      inp.click();
    });

    // ---------- Init ----------
    // Load settings
    const s = loadSettings();
    if(s){
      if(s.model) modelSel.value = s.model;
      if(s.temp) tempRange.value = s.temp;
      if(s.maxTokens) maxTokensInput.value = s.maxTokens;
    }
    tempVal.textContent = Number(tempRange.value).toFixed(2);

    // Load chat
    const loaded = loadState();
    if(loaded && Array.isArray(loaded) && loaded.length){
      // Ensure system stays first; if missing, add it
      const hasSystem = loaded.some(m => m.role === "system");
      state.history = hasSystem ? loaded : [{ role:"system", content: SYSTEM_PROMPT }, ...loaded];
    }

    renderFullChat("");
    autoGrow(userInput);
    setStatus("Gata.");
  </script>
</body>
</html>
