<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diggolo-AI Standard</title>
    <style>
        :root {
            --bg-main: #0e0e10;
            --bg-side: #171719;
            --accent: #3b82f6;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --border: #303030;
            --hover: #2a2a2d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-main); color: var(--text-primary); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-side); display: flex; flex-direction: column; padding: 10px; border-right: 1px solid var(--border); transition: all 0.3s ease; }
        .new-chat-btn { border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; font-weight: 500; margin-bottom: 20px; }
        .new-chat-btn:hover { background: var(--hover); }
        
        .history-section { flex: 1; overflow-y: auto; margin-top: 10px; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary); }
        .history-item:hover { background: var(--hover); color: white; }

        .sidebar-footer { border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        .btn-side { padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .btn-side:hover { background: var(--hover); }
        .pro-btn { background: linear-gradient(45deg, #6366f1, #a855f7); color: white; font-weight: bold; border: none; margin-bottom: 5px; animation: glow 2s infinite; }

        /* Main Chat */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-bar { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(14, 14, 16, 0.8); backdrop-filter: blur(10px); z-index: 10; }
        .login-btn { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        #chat-container { flex: 1; padding: 40px 15% 150px 15%; overflow-y: auto; scroll-behavior: smooth; }
        .msg { max-width: 85%; margin-bottom: 30px; line-height: 1.6; animation: slideUp 0.4s ease forwards; }
        .user-msg { align-self: flex-end; color: white; font-weight: 500; border-left: 2px solid var(--accent); padding-left: 15px; }
        .ai-msg { align-self: flex-start; background: transparent; }

        .input-wrapper { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 15% 40px 15%; background: linear-gradient(transparent, var(--bg-main) 30%); }
        .input-box { background: #212123; border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: center; padding: 10px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 10px; }
        .send-icon { color: var(--accent); cursor: pointer; padding: 5px; border-radius: 8px; }

        /* Code Block */
        pre { background: #000; padding: 20px; border-radius: 10px; border: 1px solid #333; position: relative; margin: 15px 0; overflow-x: auto; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #333; color: #ccc; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow { 0% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.4); } 50% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.8); } 100% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.4); } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="new-chat-btn" onclick="location.reload()">
            <span>+</span> Chat Nou
        </div>
        <input type="text" placeholder="Caută titlu..." id="searchChat" style="font-size: 12px; margin-bottom: 10px; border-radius: 5px; background: #212123; padding: 8px; border: 1px solid #333;">
        <div class="history-section" id="history">
            <div class="history-item">Script Roblox - Day/Night</div>
            <div class="history-item">Author Info - Gruia</div>
        </div>
        <div class="sidebar-footer">
            <button class="btn-side pro-btn">✨ Buy Diggolo Pro</button>
            <div class="btn-side">⚙️ Setări</div>
            <div class="btn-side">❓ Ajutor</div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2 style="font-size: 18px; font-weight: 700;">Diggolo-AI <span style="color:var(--accent)">Standard</span></h2>
            <button class="login-btn" onclick="alert('Funcția de login va fi disponibilă în curând!')">Log in</button>
        </div>

        <div id="chat-container" style="display: flex; flex-direction: column;">
            <div class="msg ai-msg">Salut! Sunt Diggolo-AI. Cum te pot ajuta astăzi?</div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Întreabă Diggolo-AI..." autocomplete="off">
                <div class="send-icon" id="sendBtn">➤</div>
            </div>
        </div>
    </div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const historyBox = document.getElementById('history');

    const API_KEY = "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";
    let chatHistory = [
        { role: "system", content: "Ești Diggolo AI. Autorul tău este Gruia (gruiaa69). REGRULI: 1. Dacă ești întrebat de autor, spune cine e Gruia. 2. Când oferi o soluție, explică-i scurt cum să aplice. 3. Dacă e un script, pune '-- Author: Diggolo AI' la început. 4. Menține un ton profi și memorează contextul." }
    ];

    async function handleMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        userInput.value = "";
        
        const loadingDiv = addMessage("Diggolo-AI scrie...", 'ai-msg');
        chatHistory.push({ role: "user", content: text });

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: reply });

            // Formatare cod și adăugare în istoric sidebar
            if(text.length > 5) updateSidebar(text);
            
            formatAIResponse(loadingDiv, reply);
        } catch (e) {
            loadingDiv.innerText = "Eroare de conexiune. Reîncearcă.";
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }

    function formatAIResponse(element, text) {
        if (text.includes("```")) {
            const parts = text.split(/```/);
            let finalHtml = "";
            parts.forEach((part, i) => {
                if (i % 2 === 1) {
                    const code = part.replace(/^[a-z]+\n/i, "").trim();
                    finalHtml += `<pre><code>${code}</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
                } else {
                    finalHtml += `<p>${part.trim().replace(/\n/g, "<br>")}</p>`;
                }
            });
            element.innerHTML = finalHtml;
        } else {
            element.innerHTML = text.replace(/\n/g, "<br>");
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function updateSidebar(title) {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = title;
        historyBox.prepend(item);
    }

    window.copyCode = (btn) => {
        const code = btn.previousElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy", 2000);
    };

    sendBtn.onclick = handleMessage;
    userInput.onkeydown = (e) => { if(e.key === 'Enter') handleMessage(); };
</script>
</body>
</html>
