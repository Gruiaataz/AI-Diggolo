<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diggolo AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin-bottom: 15px;
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    word-wrap: break-word;
}

.user-msg {
    background: #2563eb;
    align-self: flex-end;
    margin-left: auto;
}

.ai-msg {
    background: #1e293b;
}

#input-area {
    display: flex;
    padding: 15px;
    background: #0f172a;
    border-top: 1px solid #1e293b;
}

#userInput {
    flex: 1;
    resize: none;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
}

#sendBtn {
    margin-left: 10px;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
}

.code-container {
    margin-top: 10px;
    background: #0f172a;
    border-radius: 8px;
    overflow: hidden;
}

.code-header {
    background: #1e293b;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
}

.code-content {
    padding: 10px;
    font-family: monospace;
    white-space: pre-wrap;
}

.copy-btn {
    background: #2563eb;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}
</style>
</head>
<body>

<div id="chat-window"></div>

<div id="input-area">
    <textarea id="userInput" placeholder="Scrie un mesaj..."></textarea>
    <button id="sendBtn">Trimite</button>
</div>

<script>
let history = [];

async function typeEffect(element, text) {
    element.innerHTML = "";
    const parts = text.split(/```/);

    for (let i = 0; i < parts.length; i++) {

        if (i % 2 === 1) {
            const code = parts[i].trim();
            const container = document.createElement('div');
            container.className = 'code-container';
            container.innerHTML = `
                <div class="code-header">
                    <span>Script</span>
                    <button class="copy-btn" onclick="copyThis(this)">Copy Script</button>
                </div>
                <div class="code-content">${code}</div>
            `;
            element.appendChild(container);

        } else {
            const words = parts[i].split(" ");
            for (let word of words) {
                element.innerHTML += word + " ";
                await new Promise(r => setTimeout(r, 20));
                document.getElementById('chat-window').scrollTop =
                    document.getElementById('chat-window').scrollHeight;
            }
        }
    }
}

function copyThis(btn) {
    const code = btn.parentElement.nextElementSibling.innerText;
    navigator.clipboard.writeText(code);
    btn.innerText = "Copiat!";
    setTimeout(() => btn.innerText = "Copy Script", 2000);
}

async function handleChat() {

    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    const aiBlock = createAIBlock();
    const responseArea = aiBlock.querySelector('.response-text');
    const lowerText = text.toLowerCase();

    if (lowerText.includes("gruia")) {
        const reply = lowerText.includes("nu")
            ? "Gruia-Alex este unicul meu Fondator."
            : "Desigur! Gruia este Fondatorul Diggolo AI.";
        await typeEffect(responseArea, reply);
        return;
    }

    if (lowerText.includes("generează") || lowerText.includes("imagine")) {
        responseArea.innerHTML = "Generez imaginea...";
        const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&seed=${Math.floor(Math.random()*1000)}&model=flux`;
        responseArea.innerHTML = `Iată imaginea:<br><img src="${imgUrl}" style="width:100%; border-radius:12px; margin-top:10px;">`;
        return;
    }

    try {

        const response = await fetch("/chat", {   
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                messages: [...history, { role: "user", content: text }]
            })
        });

        const data = await response.json();

        if (data.error) {
            throw new Error(data.error);
        }

        await typeEffect(responseArea, data.reply);

        history.push(
            { role: "user", content: text },
            { role: "assistant", content: data.reply }
        );

    } catch (e) {
        responseArea.innerHTML =
            `<span style="color:#ff4444;">⚠️ Eroare: ${e.message}</span>`;
    }
}

function createAIBlock() {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = "msg ai-msg";
    div.innerHTML = `<div class="response-text"></div>`;
    win.appendChild(div);
    return div;
}

function addMsg(text, role) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = `msg ${role}-msg`;
    div.innerText = text;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}

document.getElementById('sendBtn').onclick = handleChat;

document.getElementById('userInput').oninput = function () {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
};

document.getElementById('userInput').onkeydown = function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleChat();
    }
};
</script>

</body>
</html>
