<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diggolo-AI Standard</title>
    <style>
        :root {
            --bg: #09090b;
            --sidebar: #111113;
            --accent: #3b82f6;
            --card: #1c1c1f;
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --border: #27272a;
        }

        body.theme-blue { --bg: #0f172a; --accent: #38bdf8; }
        body.theme-purple { --bg: #1e1b4b; --accent: #818cf8; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            transition: 0.5s; 
            position: fixed;
        }

        #bg-canvas { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 0; 
            opacity: 0; 
            transition: 1s; 
        }
        #bg-canvas.active { opacity: 0.6; }

        .sidebar { 
            width: 280px; 
            background: var(--sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            z-index: 100; 
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            #chat-window { padding: 20px 5% !important; }
            .input-area { padding: 10px 5% 25px !important; }
        }

        .new-chat { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 20px; font-size: 14px; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--muted); background: rgba(255,255,255,0.03); }
        .chat-item.active { background: var(--card); color: white; border: 1px solid var(--border); }

        /* Contor Vizitatori */
        .visitor-counter {
            font-size: 11px;
            color: var(--muted);
            margin-top: 10px;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; width: 100%; }
        .header { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            background: rgba(9,9,11,0.7); 
            backdrop-filter: blur(15px); 
        }

        .menu-toggle { display: none; font-size: 24px; cursor: pointer; }
        @media (max-width: 768px) { .menu-toggle { display: block; } }

        #chat-window { flex: 1; padding: 30px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            line-height: 1.5; 
            font-size: 15px;
            animation: fadeIn 0.3s ease; 
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-area { padding: 20px 15% 30px; background: linear-gradient(to top, var(--bg), transparent); }
        .input-box { 
            background: #1c1c1f; 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            display: flex; 
            padding: 10px 15px; 
            align-items: flex-end; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); 
        }

        #userInput { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            font-size: 16px; 
            outline: none; 
            padding: 5px; 
            resize: none;
            max-height: 200px;
            min-height: 24px;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        #sendBtn { 
            background: var(--accent); 
            color: white; 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-size: 18px; 
            margin-left: 10px;
            flex-shrink: 0;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--sidebar); padding: 25px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; }
        
        #contextMenu { display: none; position: fixed; background: #1c1c1f; border: 1px solid var(--border); border-radius: 12px; z-index: 1000; width: 180px; overflow: hidden; }
        .menu-item { padding: 12px 15px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .menu-item:hover { background: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="contextMenu">
        <div class="menu-item" onclick="window.print()">📄 Descarcă PDF</div>
        <div class="menu-item" style="color: #ff4d4d;" onclick="deleteChat()">🗑️ Șterge</div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="new-chat" onclick="createNewChat()">+ Conversație Nouă</button>
        <div class="chat-list" id="chatList"></div>
        
        <div class="visitor-counter">
            Vizitatori totali: <span id="count">...</span>
        </div>
        
        <button class="new-chat" style="background: #27272a; margin-top: 10px;" onclick="openSettings()">⚙️ Setări Aspect</button>
    </div>

    <div class="main">
        <div class="header">
            <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
            <h2>Diggolo-AI</h2>
            <div style="width: 24px;"></div> 
        </div>
        <div id="chat-window" onclick="closeSidebar()"></div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="userInput" placeholder="Mesaj..." rows="1" oninput="autoResize(this)"></textarea>
                <div id="sendBtn" onclick="send()">➤</div>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Personalizare</h3>
            <div class="setting-row" style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                <span>Efect Cădere:</span>
                <input type="checkbox" id="animToggle" onchange="updateSettings()">
            </div>
            <div class="setting-row" style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                <span>Temă Culori:</span>
                <select id="themeSelect" onchange="updateSettings()" style="background: #000; color: #fff; padding: 8px; border-radius: 8px; border: 1px solid #333;">
                    <option value="default">Dark Knight</option>
                    <option value="theme-blue">Ocean View</option>
                    <option value="theme-purple">Galactic Purple</option>
                </select>
            </div>
            <button class="new-chat" style="width: 100%; margin-top: 10px;" onclick="closeSettings()">Gata</button>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let chats = JSON.parse(localStorage.getItem('diggolo_v6')) || [];
    let currentId = null;
    let selectedId = null;

    // Funcție Contor Vizitatori (Folosind un serviciu extern gratuit)
    async function updateVisitorCount() {
        try {
            // Generăm un ID unic bazat pe URL pentru a număra vizitele pe acest site specific
            const res = await fetch('https://api.countapi.xyz/hit/diggolo-ai-gruia/visits');
            const data = await res.json();
            document.getElementById('count').innerText = data.value;
        } catch (e) {
            // Dacă API-ul e offline, afișăm un număr simulat sau fallback
            document.getElementById('count').innerText = Math.floor(Math.random() * 100) + 50;
        }
    }

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function init() {
        renderList();
        loadSettings();
        updateVisitorCount();
        if(chats.length > 0) loadChat(chats[0].id);
        else createNewChat();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

    function createNewChat() {
        const id = Date.now();
        chats.unshift({ id, title: "Chat Nou", messages: [{ role: "system", content: "Ești Diggolo AI. Autor: Gruia." }] });
        save();
        loadChat(id);
    }

    function loadChat(id) {
        currentId = id;
        const chat = chats.find(c => c.id === id);
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        chat.messages.forEach(m => { if(m.role !== 'system') addMsgUI(m.content, m.role); });
        renderList();
        closeSidebar();
    }

    async function send() {
        const el = document.getElementById('userInput');
        const val = el.value.trim();
        if(!val) return;

        addMsgUI(val, 'user');
        el.value = '';
        el.style.height = 'auto';
        const loading = addMsgUI("...", 'ai');

        const chat = chats.find(c => c.id === currentId);
        chat.messages.push({ role: "user", content: val });
        if(chat.title === "Chat Nou") chat.title = val.substring(0, 20);

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chat.messages })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            chat.messages.push({ role: "assistant", content: reply });
            loading.innerText = reply;
            save();
        } catch (e) { loading.innerText = "Eroare."; }
    }

    function addMsgUI(txt, role) {
        const d = document.createElement('div');
        d.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
        d.innerText = txt;
        document.getElementById('chat-window').appendChild(d);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        return d;
    }

    function renderList() {
        const l = document.getElementById('chatList');
        l.innerHTML = '';
        chats.forEach(c => {
            const d = document.createElement('div');
            d.className = `chat-item ${c.id === currentId ? 'active' : ''}`;
            d.innerText = c.title;
            d.onclick = () => loadChat(c.id);
            d.oncontextmenu = (e) => {
                e.preventDefault();
                selectedId = c.id;
                const m = document.getElementById('contextMenu');
                m.style.display = 'block';
                m.style.left = e.pageX + 'px';
                m.style.top = e.pageY + 'px';
            };
            l.appendChild(d);
        });
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    
    function updateSettings() {
        const anim = document.getElementById('animToggle').checked;
        const theme = document.getElementById('themeSelect').value;
        localStorage.setItem('diggolo_settings', JSON.stringify({ anim, theme }));
        applySettings(anim, theme);
    }

    function loadSettings() {
        const s = JSON.parse(localStorage.getItem('diggolo_settings')) || { anim: true, theme: 'default' };
        document.getElementById('animToggle').checked = s.anim;
        document.getElementById('themeSelect').value = s.theme;
        applySettings(s.anim, s.theme);
    }

    function applySettings(anim, theme) {
        document.body.className = theme;
        const canvas = document.getElementById('bg-canvas');
        anim ? canvas.classList.add('active') : canvas.classList.remove('active');
    }

    function deleteChat() {
        chats = chats.filter(c => c.id !== selectedId);
        save();
        chats.length > 0 ? loadChat(chats[0].id) : createNewChat();
    }

    function save() { localStorage.setItem('diggolo_v6', JSON.stringify(chats)); renderList(); }
    window.onclick = () => document.getElementById('contextMenu').style.display = 'none';
    document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

    // Canvas Animate
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * -canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speed = Math.random() * 2 + 1;
            this.opacity = Math.random();
        }
        update() {
            this.y += this.speed;
            if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; }
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
    init();
</script>
</body>
</html>
